<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>37° Nav - 星际指挥中心</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 定义全局主题颜色 */
        :root {
            --bg-dark: #0f1115; /* 极深灰背景 */
            --brand-cyan: #00f2fe; /* 赛博青色 */
            --brand-lime: #4facfe; /* 亮蓝色 */
            --brand-purple: #b026ff; /* 霓虹紫 */
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-hover: rgba(255, 255, 255, 0.08);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            /* 顶部添加一点神秘的微光渐变 */
            background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, transparent 50%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* 顶部欢迎区域 */
        .hero {
            padding: 60px 0;
            border-bottom: 1px solid var(--glass-border);
            margin-bottom: 40px;
        }
        .hero h1 {
            font-size: 3.5rem;
            margin: 0 0 15px 0;
            letter-spacing: -1px;
        }
        .hero h1 span.cyan { color: var(--brand-cyan); }
        .hero p {
            color: var(--text-muted);
            font-size: 1.2rem;
            max-width: 600px;
            line-height: 1.6;
        }

        /* 分类标题 */
        .category-title {
            font-size: 1.8rem;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .category-title i { font-size: 1.2rem; color: var(--brand-cyan); }

        /* 网格布局 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 60px;
        }

        /* 核心：毛玻璃卡片设计 */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
            text-decoration: none;
            display: flex;
            align-items: flex-start;
            gap: 15px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .glass-card:hover {
            background: var(--glass-hover);
            transform: translateY(-3px);
            border-color: var(--brand-cyan);
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.05);
        }

        /* 卡片内图标 */
        .icon-box {
            width: 45px;
            height: 45px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            background: rgba(0, 242, 254, 0.1);
            color: var(--brand-cyan);
        }
        
        /* 紫色系卡片 */
        .glass-card.purple:hover { border-color: var(--brand-purple); box-shadow: 0 10px 20px rgba(176, 38, 255, 0.05); }
        .glass-card.purple .icon-box { background: rgba(176, 38, 255, 0.1); color: var(--brand-purple); }

        /* 卡片文字 */
        .card-content { flex: 1; }
        .card-title {
            color: var(--text-main);
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0 0 8px 0;
            transition: color 0.3s ease;
        }
        .card-desc {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin: 0;
            line-height: 1.4;
        }
        .glass-card:hover .card-title { color: var(--brand-cyan); }
        .glass-card.purple:hover .card-title { color: var(--brand-purple); }
    </style>
</head>
<body>

    <div class="container">
        <div class="hero">
            <h1>Welcome to <br> 37° <span class="cyan">Nav</span></h1>
            <p>星际指挥中心已启动。汇聚全网优质资源，极速响应，零运维的 Serverless 导航中枢。</p>
        </div>

        <h2 class="category-title"><i class="fa-solid fa-compass"></i> 探索基地</h2>
        <div class="grid">
            <a href="https://github.com" target="_blank" class="glass-card">
                <div class="icon-box"><i class="fa-brands fa-github"></i></div>
                <div class="card-content">
                    <h3 class="card-title">GitHub 代码库</h3>
                    <p class="card-desc">全球最大的开源代码托管平台，你的代码大本营。</p>
                </div>
            </a>
            
            <a href="https://dash.cloudflare.com" target="_blank" class="glass-card">
                <div class="icon-box"><i class="fa-solid fa-cloud"></i></div>
                <div class="card-content">
                    <h3 class="card-title">Cloudflare 控制台</h3>
                    <p class="card-desc">强大的边缘计算网络，管理 Pages、Workers 和 D1 数据库。</p>
                </div>
            </a>
        </div>

        <h2 class="category-title" style="color: var(--brand-purple);"><i class="fa-solid fa-server"></i> 核心服务</h2>
        <div class="grid">
            <a href="#" class="glass-card purple">
                <div class="icon-box"><i class="fa-solid fa-database"></i></div>
                <div class="card-content">
                    <h3 class="card-title">D1 数据总线</h3>
                    <p class="card-desc">建立在边缘网络上的 SQLite 数据库，毫秒级读取。</p>
                </div>
            </a>

            <a href="#" class="glass-card purple">
                <div class="icon-box"><i class="fa-solid fa-bolt"></i></div>
                <div class="card-content">
                    <h3 class="card-title">KV 极速缓存</h3>
                    <p class="card-desc">键值对存储系统，让网站加载速度快如闪电。</p>
                </div>
            </a>
        </div>
    </div>

</body>
</html>
