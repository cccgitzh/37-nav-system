<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>37° Nav | 遥测终端</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        obsidian: '#030712',
                        cyan: { 400: '#22d3ee' },
                        emerald: { 500: '#10b981' },
                        crimson: { 500: '#ef4444' },
                        purple: { 500: '#b026ff' }
                    },
                    fontFamily: { mono: ['"JetBrains Mono"', 'monospace'] }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #030712;
            background-image: 
                linear-gradient(rgba(34, 211, 238, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(34, 211, 238, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            background-attachment: fixed;
            font-family: 'JetBrains Mono', monospace;
            -webkit-font-smoothing: antialiased;
            color: #ffffff;
            margin-bottom: 50px;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .solid-text-white { color: #ffffff !important; }
        .solid-text-cyan { color: #22d3ee !important; }
        .solid-text-emerald { color: #10b981 !important; }
        .solid-text-crimson { color: #ef4444 !important; }
        .solid-text-gray { color: #9ca3af !important; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #030712; }
        ::-webkit-scrollbar-thumb { background: #22d3ee; border-radius: 3px; }

        /* 模态框系统 */
        .cyber-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; }
        .cyber-overlay.active { opacity: 1; pointer-events: all; }
        .cyber-modal { background: #030712; border: 1px solid #22d3ee; box-shadow: 0 0 40px rgba(34, 211, 238, 0.15); border-radius: 12px; padding: 25px; width: 90%; max-width: 400px; transform: scale(0.95) translateY(10px); transition: transform 0.2s ease; }
        .cyber-overlay.active .cyber-modal { transform: scale(1) translateY(0); }
        .cyber-modal-title { font-weight: bold; font-size: 1.1rem; margin-bottom: 10px; display: flex; align-items: center; gap: 8px;}
        .cyber-modal-msg { color: #aaa; font-size: 0.9rem; line-height: 1.5; margin-bottom: 20px;}
        .cyber-modal-actions { display: flex; justify-content: flex-end; gap: 12px; }
        .btn-modal { padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; border: 1px solid; transition: all 0.2s; background: transparent; font-family: inherit;}
        .btn-modal.cancel { border-color: #666; color: #888; }
        .btn-modal.cancel:hover { background: #444; color: #fff; }
        .btn-modal.confirm { border-color: #22d3ee; color: #22d3ee; background: rgba(34,211,238,0.1); }
        .btn-modal.confirm:hover { background: #22d3ee; color: #030712; }
        .cyber-input { width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); color: #22d3ee; border-radius: 6px; box-sizing: border-box; font-family: inherit; margin-bottom: 20px; outline: none; transition: border-color 0.2s;}
        .cyber-input:focus { border-color: #22d3ee; box-shadow: 0 0 10px rgba(34,211,238,0.1); }
        
        /* 导航栏呼吸特效 */
        .nav-link-active { color: #22d3ee; background: rgba(34,211,238,0.1); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center pb-16 relative">

    <nav class="fixed top-0 w-full z-50 border-b border-[#22d3ee]/20 bg-[#030712]/80 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full border border-[#22d3ee]/50 overflow-hidden shadow-[0_0_10px_rgba(34,211,238,0.2)]">
                        <img src="./logo.png" alt="Logo" class="w-full h-full object-cover" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                        <div class="w-full h-full bg-[#22d3ee]/20 hidden items-center justify-center"><i class="fa-solid fa-cube text-xs solid-text-cyan"></i></div>
                    </div>
                    <span class="font-bold text-lg tracking-tight solid-text-white">37°<span class="solid-text-cyan ml-1">NAV_</span></span>
                </div>
                
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-6">
                        <a href="#" class="nav-link-active px-3 py-2 rounded-md text-sm font-bold transition-colors">总览终端</a>
                        <a href="#search-hub" class="text-gray-400 hover:solid-text-cyan px-3 py-2 rounded-md text-sm font-medium transition-colors">检索跃迁</a>
                        <a href="#dynamic-zones" class="text-gray-400 hover:solid-text-cyan px-3 py-2 rounded-md text-sm font-medium transition-colors">战术阵列</a>
                    </div>
                </div>

                <div class="flex items-center gap-4">
                    <a href="/admin.html" id="admin-link" target="_blank" class="hidden text-sm solid-text-purple hover:text-white transition-colors font-bold tracking-wider">
                        <i class="fa-solid fa-server mr-1"></i>CONSOLE
                    </a>
                    <button id="auth-btn" class="text-sm solid-text-gray hover:solid-text-cyan transition-colors focus:outline-none font-bold">
                        <i class="fa-solid fa-lock mr-1"></i>SYS_OP
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="w-full max-w-7xl flex flex-col gap-10 pt-28 px-6">
        
        <div class="flex flex-col items-center text-center mt-2 mb-6">
            <div class="w-24 h-24 rounded-full border-2 border-[#22d3ee]/30 shadow-[0_0_30px_rgba(34,211,238,0.2)] flex items-center justify-center overflow-hidden animate-[bounce_6s_infinite] mb-6">
                <img src="./logo.png" alt="Logo" class="w-full h-full object-cover" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                <i class="fa-solid fa-cube text-4xl solid-text-cyan hidden"></i>
            </div>
            <h1 class="text-5xl md:text-6xl font-extrabold solid-text-white tracking-tighter mb-4">
                37° <span class="solid-text-cyan">NAV_</span>
            </h1>
            <p class="text-sm md:text-base font-bold solid-text-emerald tracking-widest">> SYS.READY // EDGE AI TELEMETRY ACTIVE</p>
            <p class="mt-4 text-gray-400 max-w-xl text-sm md:text-base leading-relaxed">
                全栈 Serverless 遥测导航中枢。汇聚极客资源，搭载边缘计算与 AI 靶向解析链路，构建坚不可摧的赛博生态。
            </p>
        </div>

        <section id="search-hub" class="glass-panel p-4 rounded-lg flex flex-col lg:flex-row gap-4 mt-4">
            <form id="web-search-form" class="flex-1 flex gap-2">
                <select id="engine-select" class="bg-[#030712] border border-[#22d3ee]/30 solid-text-cyan px-3 py-2 rounded text-sm focus:outline-none">
                    <option value="https://www.google.com/search?q=">Google</option>
                    <option value="https://www.bing.com/search?q=">Bing</option>
                    <option value="https://github.com/search?q=">GitHub</option>
                </select>
                <input type="text" id="web-search-input" placeholder="外网检索跃迁..." required class="flex-1 bg-[#030712] border border-[#22d3ee]/30 solid-text-white px-4 py-2 rounded text-sm focus:outline-none focus:border-[#22d3ee]">
                <button type="submit" class="bg-[#22d3ee]/10 border border-[#22d3ee] solid-text-cyan px-4 py-2 rounded hover:bg-[#22d3ee] hover:text-[#030712] transition-colors"><i class="fa-solid fa-rocket"></i></button>
            </form>
            <div class="hidden lg:block w-px bg-[#22d3ee]/20"></div>
            <div class="flex-1 relative">
                <i class="fa-solid fa-robot absolute left-4 top-1/2 -translate-y-1/2 solid-text-cyan"></i>
                <input type="text" id="ai-filter-input" placeholder="唤醒 AI 语义检索 / 即时过滤节点..." class="w-full bg-[#030712] border border-[#22d3ee]/30 solid-text-white pl-10 pr-4 py-2 rounded text-sm focus:outline-none focus:border-[#22d3ee]">
            </div>
        </section>

        <div id="dynamic-zones" class="flex flex-col gap-10 scroll-mt-24">
            <p class="text-sm solid-text-cyan">> 正在连接 D1 核心，拉取全站分类数据...</p>
        </div>

    </main>

    <footer class="fixed bottom-0 left-0 w-full h-10 bg-[#030712] border-t border-[#10b981]/30 flex items-center justify-between px-6 z-40 shadow-[0_-5px_20px_rgba(0,0,0,0.8)]">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-heart-pulse solid-text-emerald animate-pulse text-base"></i>
            <span class="text-xs font-bold solid-text-emerald tracking-wider hidden sm:inline">TELEMETRY_LINK_ACTIVE</span>
        </div>
        <div id="hud-uptime" class="text-xs font-bold solid-text-cyan tracking-wider"></div>
    </footer>

    <div id="sys-modal-root"></div>

    <script>
        /* =========================================================
           赛博模态框 UI 引擎
           ========================================================= */
        const SysUI = {
            createContainer(id) {
                const existing = document.getElementById(id);
                if(existing) existing.remove();
                const overlay = document.createElement('div');
                overlay.id = id; overlay.className = 'cyber-overlay';
                document.getElementById('sys-modal-root').appendChild(overlay);
                return overlay;
            },
            close(overlay) {
                overlay.classList.remove('active');
                setTimeout(() => overlay.remove(), 250);
            },
            showPrompt(title, msg, type = 'text') {
                return new Promise(resolve => {
                    const overlay = this.createContainer('cyber-prompt');
                    overlay.innerHTML = `
                        <div class="cyber-modal">
                            <div class="cyber-modal-title" style="color:#22d3ee;"><i class="fa-solid fa-terminal"></i> ${title}</div>
                            <div class="cyber-modal-msg">${msg}</div>
                            <input type="${type}" id="prompt-input" class="cyber-input" autocomplete="off">
                            <div class="cyber-modal-actions">
                                <button class="btn-modal cancel" id="p-cancel">CANCEL</button>
                                <button class="btn-modal confirm" id="p-ok">OVERRIDE</button>
                            </div>
                        </div>
                    `;
                    requestAnimationFrame(() => overlay.classList.add('active'));
                    const input = overlay.querySelector('#prompt-input');
                    input.focus();
                    
                    overlay.querySelector('#p-cancel').onclick = () => { this.close(overlay); resolve(null); };
                    overlay.querySelector('#p-ok').onclick = () => { this.close(overlay); resolve(input.value); };
                    input.addEventListener('keypress', (e) => { if(e.key === 'Enter') overlay.querySelector('#p-ok').click(); });
                });
            },
            showConfirm(title, msg, isDanger = false) {
                return new Promise(resolve => {
                    const overlay = this.createContainer('cyber-confirm');
                    const themeColor = isDanger ? '#ef4444' : '#10b981';
                    const btnClass = isDanger ? 'danger' : 'confirm';
                    const icon = isDanger ? 'fa-triangle-exclamation' : 'fa-circle-check';
                    
                    overlay.innerHTML = `
                        <div class="cyber-modal" style="border-color:${themeColor}">
                            <div class="cyber-modal-title" style="color:${themeColor};"><i class="fa-solid ${icon}"></i> ${title}</div>
                            <div class="cyber-modal-msg">${msg}</div>
                            <div class="cyber-modal-actions">
                                <button class="btn-modal cancel" id="c-cancel">CANCEL</button>
                                <button class="btn-modal ${btnClass}" id="c-ok">CONFIRM</button>
                            </div>
                        </div>
                    `;
                    requestAnimationFrame(() => overlay.classList.add('active'));
                    
                    overlay.querySelector('#c-cancel').onclick = () => { this.close(overlay); resolve(false); };
                    overlay.querySelector('#c-ok').onclick = () => { this.close(overlay); resolve(true); };
                });
            }
        };

        /* =========================================================
           系统核心逻辑
           ========================================================= */
        let globalCategories = [];
        let globalNodes = [];
        let isAdmin = sessionStorage.getItem('sys_op_token') === 'AUTHORIZED';
        const dynamicZones = document.getElementById('dynamic-zones');

        async function fetchSystemData() {
            try {
                const [catRes, nodeRes] = await Promise.all([ fetch('/api/categories'), fetch('/api/nodes') ]);
                globalCategories = await catRes.json();
                globalNodes = await nodeRes.json();
                renderCategorizedNodes(globalNodes);
            } catch (e) {
                dynamicZones.innerHTML = '<p class="solid-text-crimson">> [FATAL] 数据库核心链路断开。</p>';
            }
        }

        function renderCategorizedNodes(nodes) {
            dynamicZones.innerHTML = '';
            if (nodes.length === 0) {
                dynamicZones.innerHTML = '<p class="solid-text-gray">> 扫描未命中任何战术节点。</p>';
                return;
            }

            const grouped = {};
            globalCategories.forEach(c => grouped[c.name] = []);
            nodes.forEach(n => {
                if(!grouped[n.category]) grouped[n.category] = [];
                grouped[n.category].push(n);
            });

            for (const [catName, catNodes] of Object.entries(grouped)) {
                if (catNodes.length === 0) continue;

                const zone = document.createElement('div');
                zone.innerHTML = `
                    <div class="flex items-center gap-2 mb-6">
                        <h2 class="text-2xl font-bold solid-text-white">${catName}<span class="solid-text-cyan text-sm align-top ml-1">°</span></h2>
                        <div class="h-px bg-[#22d3ee]/20 flex-grow ml-4"></div>
                    </div>`;
                
                const grid = document.createElement('div');
                grid.className = 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6';

                catNodes.forEach(link => {
                    const card = document.createElement('a');
                    card.href = link.url;
                    card.target = '_blank';
                    // 与 NodeSeek 风格对齐，去除极端的粗边框，改为细腻的毛玻璃和悬浮发光
                    card.className = `relative glass-panel rounded-xl p-5 flex items-center gap-4 hover:bg-white/5 hover:border-[#22d3ee]/50 transition-all duration-300 group w-full min-w-0 overflow-hidden block`;
                    
                    const iconPreview = link.icon && link.icon.startsWith('http')
                        ? `<img src="${link.icon}" loading="lazy" alt="icon" class="w-10 h-10 rounded-md object-contain filter drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)] group-hover:scale-110 transition-transform duration-300" onerror="this.onerror=null; this.outerHTML='<i class=\\'fa-solid fa-link text-xl group-hover:scale-110 transition-transform duration-300\\'></i>'">`
                        : `<i class="${link.icon || 'fa-solid fa-link'} text-xl group-hover:scale-110 transition-transform duration-300"></i>`;

                    const adminHtml = isAdmin ? `
                        <div class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity z-10">
                            <button onclick="deleteNode(event, ${link.id}, '${link.title.replace(/'/g, "\\'")}')" class="text-xs solid-text-crimson hover:text-white bg-[#030712] px-2 py-1 rounded shadow"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    ` : '';

                    card.innerHTML = `
                        ${adminHtml}
                        <div class="flex-shrink-0 w-12 h-12 bg-[#22d3ee]/10 rounded-lg flex items-center justify-center solid-text-cyan shadow-inner">
                            ${iconPreview}
                        </div>
                        <div class="flex-1 min-w-0">
                            <h3 class="text-base font-medium solid-text-white truncate group-hover:solid-text-cyan transition-colors">${link.title}</h3>
                            <p class="text-xs solid-text-gray truncate mt-1">${link.description || '暂无特征数据'}</p>
                        </div>
                    `;
                    grid.appendChild(card);
                });
                zone.appendChild(grid);
                dynamicZones.appendChild(zone);
            }
        }

        function updateAdminUI() {
            const authBtn = document.getElementById('auth-btn');
            const adminLink = document.getElementById('admin-link');
            if (isAdmin) {
                authBtn.innerHTML = '<i class="fa-solid fa-unlock"></i><span class="hidden md:inline ml-1">LOGOUT</span>';
                authBtn.className = "text-sm solid-text-crimson hover:text-white transition-colors font-bold focus:outline-none";
                adminLink.classList.remove('hidden'); 
            } else {
                authBtn.innerHTML = '<i class="fa-solid fa-lock"></i><span class="hidden md:inline ml-1">SYS_OP</span>';
                authBtn.className = "text-sm solid-text-gray hover:solid-text-cyan transition-colors font-bold focus:outline-none";
                adminLink.classList.add('hidden');
            }
            renderCategorizedNodes(globalNodes);
        }

        document.getElementById('auth-btn').addEventListener('click', async () => {
            if (isAdmin) { 
                sessionStorage.removeItem('sys_op_token'); 
                isAdmin = false; 
            } else { 
                const pwd = await SysUI.showPrompt('系统鉴权 (SYS_AUTH)', '请输入超级管理员覆写密钥:', 'password');
                if (pwd === 'root') { 
                    sessionStorage.setItem('sys_op_token', 'AUTHORIZED'); 
                    isAdmin = true; 
                } else if (pwd !== null) {
                    await SysUI.showConfirm('鉴权失败', '密钥无效，终端连接已被防区系统拒绝。', true);
                }
            }
            updateAdminUI();
        });

        window.deleteNode = async function(e, id, title) {
            e.preventDefault(); 
            const confirm = await SysUI.showConfirm('抹除节点', `警告：确定要永久销毁节点 [ ${title} ] 吗？此操作不可逆！`, true);
            if (!confirm) return;

            try {
                const response = await fetch('/api/nodes', { method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id }) });
                if (response.ok) fetchSystemData();
            } catch (error) {}
        };

        let aiTimeout = null;
        document.getElementById('ai-filter-input').addEventListener('input', (e) => {
            clearTimeout(aiTimeout);
            const query = e.target.value.trim();
            if (!query) { renderCategorizedNodes(globalNodes); return; }
            
            const localFiltered = globalNodes.filter(n => n.title.toLowerCase().includes(query.toLowerCase()) || (n.description && n.description.toLowerCase().includes(query.toLowerCase())));
            renderCategorizedNodes(localFiltered);

            aiTimeout = setTimeout(async () => {
                try {
                    const res = await fetch('/api/search?q=' + encodeURIComponent(query));
                    const aiNodes = await res.json();
                    dynamicZones.innerHTML = `
                        <div class="flex items-center gap-2 mb-6">
                            <h2 class="text-2xl font-bold solid-text-purple">AI 脑机检索结果<span class="solid-text-purple text-sm align-top ml-1">°</span></h2>
                            <div class="h-px bg-[#b026ff]/20 flex-grow ml-4"></div>
                        </div>`;
                    const grid = document.createElement('div');
                    grid.className = 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6';
                    aiNodes.forEach(link => {
                        const iconPreview = link.icon && link.icon.startsWith('http') ? `<img src="${link.icon}" loading="lazy" class="w-10 h-10 rounded-md object-contain group-hover:scale-110 transition-transform duration-300" onerror="this.onerror=null; this.outerHTML='<i class=\\'fa-solid fa-link text-xl\\'></i>'">` : `<i class="${link.icon || 'fa-solid fa-link'} text-xl group-hover:scale-110 transition-transform duration-300"></i>`;
                        grid.innerHTML += `
                            <a href="${link.url}" target="_blank" class="relative glass-panel rounded-xl p-5 flex items-center gap-4 hover:bg-white/5 hover:border-[#b026ff]/50 transition-all duration-300 group w-full min-w-0 overflow-hidden block">
                                <div class="flex-shrink-0 w-12 h-12 bg-[#b026ff]/10 rounded-lg flex items-center justify-center text-[#b026ff] shadow-inner">${iconPreview}</div>
                                <div class="flex-1 min-w-0">
                                    <h3 class="text-base font-medium solid-text-white truncate group-hover:text-[#b026ff] transition-colors">${link.title}</h3>
                                    <p class="text-xs solid-text-gray truncate mt-1">${link.description || '暂无特征数据'}</p>
                                </div>
                            </a>`;
                    });
                    dynamicZones.appendChild(grid);
                } catch(e) {}
            }, 800);
        });

        document.getElementById('web-search-form').addEventListener('submit', (e) => {
            e.preventDefault();
            window.open(document.getElementById('engine-select').value + encodeURIComponent(document.getElementById('web-search-input').value), '_blank');
        });

        const gTime = new Date('2024-01-01T00:00:00Z').getTime();
        setInterval(() => {
            const d = new Date().getTime() - gTime;
            document.getElementById('hud-uptime').textContent = `系统存活 ${Math.floor(d/86400000)}天 ${Math.floor((d%86400000)/3600000)}小时 ${Math.floor((d%3600000)/60000)}分 ${Math.floor((d%60000)/1000)}秒`;
        }, 1000);

        updateAdminUI();
        fetchSystemData();
    </script>
</body>
</html>
