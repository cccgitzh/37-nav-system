<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>37° Nav | 战术遥测终端</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        /* 纯正 Dracula 官方色卡 */
                        dracula: {
                            dark: '#1E1F29',    // 极深底色
                            bg: '#282A36',      // 基础背景
                            current: '#44475A', // 行高亮/边框
                            fg: '#F8F8F2',      // 前景文本
                            comment: '#6272A4', // 注释文本
                            cyan: '#8BE9FD',
                            green: '#50FA7B',
                            pink: '#FF79C6',
                            purple: '#BD93F9',
                            red: '#FF5555',
                            yellow: '#F1FA8C'
                        }
                    },
                    fontFamily: { mono: ['"JetBrains Mono"', 'monospace'] }
                }
            }
        }
    </script>

    <style>
        html { scroll-behavior: smooth; }
        body {
            background-color: #282A36;
            background-image: 
                linear-gradient(rgba(139, 233, 253, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(139, 233, 253, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
            background-attachment: fixed;
            font-family: 'JetBrains Mono', monospace;
            -webkit-font-smoothing: antialiased;
            color: #F8F8F2;
            margin-bottom: 50px;
        }

        /* 隐藏横向滚动条，但保持可滑动 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 纵向滚动条美化 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1E1F29; }
        ::-webkit-scrollbar-thumb { background: #6272A4; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #BD93F9; }

        /* 赛博全息模态框 (Dracula版) */
        .cyber-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; }
        .cyber-overlay.active { opacity: 1; pointer-events: all; }
        .cyber-modal { background: #282A36; border: 1px solid #BD93F9; box-shadow: 0 0 30px rgba(189, 147, 249, 0.2); border-radius: 12px; padding: 25px; width: 90%; max-width: 400px; transform: scale(0.95); transition: transform 0.2s ease; }
        .cyber-overlay.active .cyber-modal { transform: scale(1); }
        .btn-modal { padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; border: 1px solid; transition: all 0.2s; background: transparent; }
        .btn-modal.cancel { border-color: #6272A4; color: #6272A4; }
        .btn-modal.cancel:hover { background: #44475A; color: #F8F8F2; }
        .btn-modal.confirm { border-color: #BD93F9; color: #BD93F9; background: rgba(189, 147, 249, 0.1); }
        .btn-modal.confirm:hover { background: #BD93F9; color: #282A36; }
        .cyber-input { width: 100%; padding: 12px; background: #1E1F29; border: 1px solid #44475A; color: #F8F8F2; border-radius: 6px; box-sizing: border-box; margin-bottom: 20px; outline: none; transition: border-color 0.2s;}
        .cyber-input:focus { border-color: #8BE9FD; box-shadow: 0 0 10px rgba(139, 233, 253, 0.1); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center pb-16 relative">

    <header class="fixed top-0 w-full z-50 bg-dracula-bg/95 backdrop-blur-md border-b border-dracula-current h-16 shadow-lg shadow-black/20">
        <div class="max-w-[1400px] h-full mx-auto px-4 flex items-center justify-between gap-4">
            
            <div class="flex items-center gap-2 md:gap-6 h-full flex-1 min-w-0">
                <a href="#" onclick="window.scrollTo(0,0)" class="flex items-center gap-2 flex-shrink-0 group">
                    <div class="w-8 h-8 rounded border border-dracula-purple/50 flex items-center justify-center bg-dracula-current overflow-hidden">
                        <img src="./logo.png" alt="Logo" class="w-full h-full object-cover" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                        <i class="fa-solid fa-cube text-dracula-cyan hidden text-sm"></i>
                    </div>
                    <span class="text-lg font-bold text-dracula-fg tracking-tight hidden sm:block group-hover:text-dracula-pink transition-colors">37°<span class="text-dracula-purple">NAV</span></span>
                </a>
                
                <div id="nav-categories" class="flex items-center gap-1 h-full overflow-x-auto no-scrollbar flex-1 mask-edges text-sm font-medium">
                    <span class="text-dracula-comment text-xs">Syncing...</span>
                </div>
            </div>

            <div class="flex items-center gap-3 flex-shrink-0">
                
                <div class="hidden lg:flex items-center bg-dracula-dark/80 border border-dracula-current rounded-lg p-1 transition-colors focus-within:border-dracula-purple focus-within:bg-dracula-dark shadow-inner">
                    <form id="web-search-form" class="flex items-center pl-2 pr-1 border-r border-dracula-comment/40">
                        <select id="engine-select" class="bg-transparent text-dracula-comment hover:text-dracula-cyan text-xs outline-none cursor-pointer">
                            <option value="https://www.google.com/search?q=">G</option>
                            <option value="https://www.bing.com/search?q=">B</option>
                            <option value="https://github.com/search?q=">Hub</option>
                        </select>
                        <input type="text" id="web-search-input" placeholder="Search..." required class="bg-transparent text-dracula-fg text-sm outline-none px-2 w-20 focus:w-32 transition-all placeholder-dracula-comment">
                        <button type="submit" class="text-dracula-comment hover:text-dracula-pink"><i class="fa-solid fa-arrow-right-to-bracket"></i></button>
                    </form>
                    
                    <div class="flex items-center pl-2 pr-1 relative">
                        <i class="fa-solid fa-robot text-dracula-comment text-sm"></i>
                        <input type="text" id="ai-filter-input" placeholder="AI Filter..." class="bg-transparent text-dracula-fg text-sm outline-none px-2 w-24 focus:w-36 transition-all placeholder-dracula-comment">
                        <kbd class="text-[10px] text-dracula-fg bg-dracula-current rounded px-1 border border-[#55586B]">⌘K</kbd>
                    </div>
                </div>
                
                <a href="/admin.html" id="admin-link" target="_blank" class="hidden text-sm text-dracula-comment hover:text-dracula-cyan font-bold transition-colors border border-transparent hover:border-dracula-cyan/30 px-2 py-1 rounded">
                    <i class="fa-solid fa-server mr-1"></i>Console
                </a>
                <button id="auth-btn" class="text-sm bg-dracula-purple hover:bg-dracula-pink text-dracula-dark font-bold px-3 py-1.5 rounded-lg transition-colors shadow-lg flex items-center gap-1.5">
                    <i class="fa-solid fa-lock"></i><span class="hidden sm:inline">SYS_OP</span>
                </button>
            </div>
        </div>
    </header>

    <main class="w-full max-w-7xl flex flex-col gap-12 pt-28 px-6">
        <div id="dynamic-zones" class="flex flex-col gap-12"></div>
    </main>

    <footer class="fixed bottom-0 left-0 w-full h-10 bg-dracula-dark border-t border-dracula-current flex items-center justify-between px-6 z-40">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-heart-pulse text-dracula-green animate-pulse text-base"></i>
            <span class="text-xs font-bold text-dracula-green tracking-wider hidden sm:inline">TELEMETRY_LINK_ACTIVE</span>
        </div>
        <div id="hud-uptime" class="text-xs font-bold text-dracula-purple tracking-wider"></div>
    </footer>

    <div id="sys-modal-root"></div>

    <script>
        /* =========================================================
           赛博模态框 UI 引擎
           ========================================================= */
        const SysUI = {
            createContainer(id) {
                const existing = document.getElementById(id);
                if(existing) existing.remove();
                const overlay = document.createElement('div');
                overlay.id = id; overlay.className = 'cyber-overlay';
                document.getElementById('sys-modal-root').appendChild(overlay);
                return overlay;
            },
            close(overlay) {
                overlay.classList.remove('active');
                setTimeout(() => overlay.remove(), 250);
            },
            showPrompt(title, msg, type = 'text') {
                return new Promise(resolve => {
                    const overlay = this.createContainer('cyber-prompt');
                    overlay.innerHTML = `
                        <div class="cyber-modal">
                            <div class="cyber-modal-title" style="color:var(--dracula-cyan);"><i class="fa-solid fa-terminal"></i> ${title}</div>
                            <div class="cyber-modal-msg" style="color:var(--dracula-fg); margin-bottom:15px;">${msg}</div>
                            <input type="${type}" id="prompt-input" class="cyber-input" autocomplete="off">
                            <div class="cyber-modal-actions">
                                <button class="btn-modal cancel" id="p-cancel">Cancel</button>
                                <button class="btn-modal confirm" id="p-ok">Authorize</button>
                            </div>
                        </div>
                    `;
                    requestAnimationFrame(() => overlay.classList.add('active'));
                    const input = overlay.querySelector('#prompt-input');
                    input.focus();
                    overlay.querySelector('#p-cancel').onclick = () => { this.close(overlay); resolve(null); };
                    overlay.querySelector('#p-ok').onclick = () => { this.close(overlay); resolve(input.value); };
                    input.addEventListener('keypress', (e) => { if(e.key === 'Enter') overlay.querySelector('#p-ok').click(); });
                });
            },
            showConfirm(title, msg, isDanger = false) {
                return new Promise(resolve => {
                    const overlay = this.createContainer('cyber-confirm');
                    const themeColor = isDanger ? '#FF5555' : '#50FA7B';
                    const btnClass = isDanger ? 'danger' : 'confirm';
                    const icon = isDanger ? 'fa-triangle-exclamation' : 'fa-circle-check';
                    overlay.innerHTML = `
                        <div class="cyber-modal" style="border-color:${themeColor}">
                            <div class="cyber-modal-title" style="color:${themeColor};"><i class="fa-solid ${icon}"></i> ${title}</div>
                            <div class="cyber-modal-msg" style="color:var(--dracula-fg); margin-bottom:20px;">${msg}</div>
                            <div class="cyber-modal-actions">
                                <button class="btn-modal cancel" id="c-cancel">Cancel</button>
                                <button class="btn-modal ${btnClass}" id="c-ok">Confirm</button>
                            </div>
                        </div>
                    `;
                    requestAnimationFrame(() => overlay.classList.add('active'));
                    overlay.querySelector('#c-cancel').onclick = () => { this.close(overlay); resolve(false); };
                    overlay.querySelector('#c-ok').onclick = () => { this.close(overlay); resolve(true); };
                });
            }
        };

        /* =========================================================
           系统核心逻辑
           ========================================================= */
        let globalCategories = [];
        let globalNodes = [];
        let isAdmin = sessionStorage.getItem('sys_op_token') === 'AUTHORIZED';
        const dynamicZones = document.getElementById('dynamic-zones');
        const navCatContainer = document.getElementById('nav-categories');

        async function fetchSystemData() {
            try {
                const [catRes, nodeRes] = await Promise.all([ fetch('/api/categories'), fetch('/api/nodes') ]);
                globalCategories = await catRes.json();
                globalNodes = await nodeRes.json();
                
                renderNavbarCategories();
                renderCategorizedNodes(globalNodes);
            } catch (e) {
                dynamicZones.innerHTML = '<p class="text-dracula-red">> [FATAL] 数据库核心链路断开。</p>';
            }
        }

        // 渲染顶部单行分类导航
        function renderNavbarCategories() {
            if(globalCategories.length === 0) {
                navCatContainer.innerHTML = '<span class="text-dracula-comment text-xs">No categories found.</span>';
                return;
            }
            navCatContainer.innerHTML = globalCategories.map(c => `
                <a href="#cat-${c.name.replace(/\s+/g, '-')}" class="text-dracula-comment hover:text-dracula-fg hover:bg-dracula-current/50 px-3 py-1.5 rounded-lg whitespace-nowrap transition-colors border border-transparent hover:border-dracula-current">
                    ${c.name}
                </a>
            `).join('');
        }

        // 渲染阵列卡片
        function renderCategorizedNodes(nodes, isAiSearch = false) {
            dynamicZones.innerHTML = '';
            
            if (isAiSearch) {
                if (nodes.length === 0) {
                    dynamicZones.innerHTML = '<p class="text-dracula-comment">> 神经元未匹配到相关结果。</p>';
                    return;
                }
                const zone = document.createElement('div');
                zone.innerHTML = `
                    <div class="flex items-center gap-3 mb-6">
                        <h2 class="text-2xl font-bold text-dracula-pink">AI 检索结果</h2>
                        <div class="h-px bg-dracula-pink/20 flex-grow"></div>
                    </div>`;
                zone.appendChild(buildGrid(nodes, 'pink'));
                dynamicZones.appendChild(zone);
                return;
            }

            if (nodes.length === 0) {
                dynamicZones.innerHTML = '<p class="text-dracula-comment">> 扫描未命中任何战术节点。</p>';
                return;
            }

            const grouped = {};
            globalCategories.forEach(c => grouped[c.name] = []);
            nodes.forEach(n => {
                if(!grouped[n.category]) grouped[n.category] = [];
                grouped[n.category].push(n);
            });

            for (const [catName, catNodes] of Object.entries(grouped)) {
                if (catNodes.length === 0) continue;

                const zone = document.createElement('div');
                // 预留顶部单行导航栏的高度 (h-16 = 4rem = 64px)
                zone.id = `cat-${catName.replace(/\s+/g, '-')}`;
                zone.className = "scroll-mt-24"; 
                
                zone.innerHTML = `
                    <div class="flex items-center gap-3 mb-6">
                        <h2 class="text-xl font-bold text-dracula-cyan">${catName}</h2>
                        <div class="h-px bg-dracula-current flex-grow"></div>
                    </div>`;
                
                zone.appendChild(buildGrid(catNodes, 'cyan'));
                dynamicZones.appendChild(zone);
            }
        }

        function buildGrid(nodesArray, theme = 'cyan') {
            const grid = document.createElement('div');
            grid.className = 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6';

            nodesArray.forEach(link => {
                const card = document.createElement('a');
                card.href = link.url; card.target = '_blank';
                // 纯正 Dracula 极简深色毛玻璃卡片
                card.className = `relative bg-dracula-current/30 hover:bg-dracula-current/60 backdrop-blur-md rounded-xl p-4 flex items-center gap-4 border border-[#ffffff08] hover:border-dracula-${theme}/50 transition-all duration-300 group w-full min-w-0 overflow-hidden block shadow-sm hover:shadow-[0_5px_15px_rgba(0,0,0,0.3)]`;
                
                // 【核心修复：彻底解决图裂】通过嵌套隐藏节点来避免内联 JS 字符串报错
                let iconHTML = '';
                if (link.icon && link.icon.startsWith('http')) {
                    iconHTML = `
                        <div class="relative w-10 h-10 flex items-center justify-center">
                            <img src="${link.icon}" loading="lazy" alt="icon" class="w-full h-full rounded object-contain filter drop-shadow-md group-hover:scale-110 transition-transform duration-300" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                            <i class="fa-solid fa-link text-dracula-purple text-xl hidden group-hover:scale-110 transition-transform duration-300"></i>
                        </div>`;
                } else {
                    iconHTML = `<div class="w-10 h-10 flex items-center justify-center"><i class="${link.icon || 'fa-solid fa-link'} text-xl text-dracula-purple group-hover:scale-110 transition-transform duration-300"></i></div>`;
                }

                const adminHtml = isAdmin ? `
                    <div class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity z-10">
                        <button onclick="deleteNode(event, ${link.id}, '${link.title.replace(/'/g, "\\'")}')" class="text-xs text-dracula-red hover:text-white bg-dracula-dark border border-dracula-red/30 hover:bg-dracula-red px-2 py-1 rounded shadow transition-colors"><i class="fa-solid fa-trash"></i></button>
                    </div>` : '';

                card.innerHTML = `
                    ${adminHtml}
                    <div class="flex-shrink-0 w-12 h-12 bg-dracula-bg rounded-lg flex items-center justify-center border border-dracula-current shadow-inner">
                        ${iconHTML}
                    </div>
                    <div class="flex-1 min-w-0">
                        <h3 class="text-base font-bold text-dracula-fg truncate group-hover:text-dracula-${theme} transition-colors">${link.title}</h3>
                        <p class="text-xs text-dracula-comment truncate mt-1">${link.description || '暂无特征数据'}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
            return grid;
        }

        // =====================================
        // 系统鉴权与业务
        // =====================================
        function updateAdminUI() {
            const authBtn = document.getElementById('auth-btn');
            const adminLink = document.getElementById('admin-link');
            
            if (isAdmin) {
                authBtn.innerHTML = '<i class="fa-solid fa-unlock"></i><span class="hidden md:inline ml-1.5">LOGOUT</span>';
                authBtn.className = "text-sm bg-dracula-red hover:bg-[#ff7373] text-dracula-dark font-bold px-3 py-1.5 rounded-lg transition-colors flex items-center shadow-lg shadow-dracula-red/20";
                adminLink.classList.remove('hidden'); 
            } else {
                authBtn.innerHTML = '<i class="fa-solid fa-lock"></i><span class="hidden md:inline ml-1.5">SYS_OP</span>';
                authBtn.className = "text-sm bg-dracula-purple hover:bg-dracula-pink text-dracula-dark font-bold px-3 py-1.5 rounded-lg transition-colors flex items-center shadow-lg shadow-dracula-purple/20";
                adminLink.classList.add('hidden');
            }
            renderCategorizedNodes(globalNodes);
        }

        document.getElementById('auth-btn').addEventListener('click', async () => {
            if (isAdmin) { 
                sessionStorage.removeItem('sys_op_token'); isAdmin = false; 
            } else { 
                const pwd = await SysUI.showPrompt('SYS_AUTH', 'Enter Override Key:', 'password');
                if (pwd === 'root') { sessionStorage.setItem('sys_op_token', 'AUTHORIZED'); isAdmin = true; } 
                else if (pwd !== null) { await SysUI.showConfirm('Access Denied', 'Authentication failed.', true); }
            }
            updateAdminUI();
        });

        window.deleteNode = async function(e, id, title) {
            e.preventDefault(); 
            const confirm = await SysUI.showConfirm('Terminate Node', `Destroy node [ ${title} ] permanently?`, true);
            if (!confirm) return;
            try {
                const response = await fetch('/api/nodes', { method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id }) });
                if (response.ok) fetchSystemData();
            } catch (error) {}
        };

        // 搜索引擎接入
        let aiTimeout = null;
        document.getElementById('ai-filter-input').addEventListener('input', (e) => {
            clearTimeout(aiTimeout);
            const query = e.target.value.trim();
            if (!query) { renderCategorizedNodes(globalNodes); return; }
            
            const localFiltered = globalNodes.filter(n => n.title.toLowerCase().includes(query.toLowerCase()) || (n.description && n.description.toLowerCase().includes(query.toLowerCase())));
            renderCategorizedNodes(localFiltered);

            aiTimeout = setTimeout(async () => {
                try {
                    const res = await fetch('/api/search?q=' + encodeURIComponent(query));
                    const aiNodes = await res.json();
                    renderCategorizedNodes(aiNodes, true); 
                } catch(e) {}
            }, 800);
        });

        document.getElementById('web-search-form').addEventListener('submit', (e) => {
            e.preventDefault();
            window.open(document.getElementById('engine-select').value + encodeURIComponent(document.getElementById('web-search-input').value), '_blank');
        });

        // 底部时钟引擎
        const gTime = new Date('2024-01-01T00:00:00Z').getTime();
        setInterval(() => {
            const d = new Date().getTime() - gTime;
            document.getElementById('hud-uptime').textContent = `UPTIME: ${Math.floor(d/86400000)}D ${Math.floor((d%86400000)/3600000)}H`;
        }, 60000); 
        const dInit = new Date().getTime() - gTime;
        document.getElementById('hud-uptime').textContent = `UPTIME: ${Math.floor(dInit/86400000)}D ${Math.floor((dInit%86400000)/3600000)}H`;

        updateAdminUI();
        fetchSystemData();
    </script>
</body>
</html>
