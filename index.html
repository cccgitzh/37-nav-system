<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>37° Nav | 战术遥测终端</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        /* 注入正统 Dracula 官方色卡 */
                        dracula: {
                            dark: '#0E0D11',    // 极深背景
                            bg: '#282a36',      // 控件背景
                            current: '#44475a', // 边框与高亮
                            fg: '#f8f8f2',      // 前景文字
                            comment: '#6272a4', // 注释/失焦文字
                            cyan: '#8be9fd',
                            green: '#50fa7b',
                            orange: '#ffb86c',
                            pink: '#ff79c6',
                            purple: '#bd93f9',
                            red: '#ff5555',
                            yellow: '#f1fa8c'
                        }
                    },
                    fontFamily: { mono: ['"JetBrains Mono"', 'monospace'] }
                }
            }
        }
    </script>

    <style>
        html { scroll-behavior: smooth; }

        body {
            background-color: #0E0D11;
            background-image: 
                linear-gradient(rgba(139, 233, 253, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(139, 233, 253, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
            background-attachment: fixed;
            font-family: 'JetBrains Mono', monospace;
            -webkit-font-smoothing: antialiased;
            color: #f8f8f2;
            margin-bottom: 50px;
        }

        .glass-panel {
            background: rgba(40, 42, 54, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid #44475a;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0E0D11; }
        ::-webkit-scrollbar-thumb { background: #bd93f9; border-radius: 3px; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 赛博模态框系统 (适配 Dracula 配色) */
        .cyber-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; }
        .cyber-overlay.active { opacity: 1; pointer-events: all; }
        .cyber-modal { background: #282a36; border: 1px solid #bd93f9; box-shadow: 0 0 40px rgba(189, 147, 249, 0.15); border-radius: 12px; padding: 25px; width: 90%; max-width: 400px; transform: scale(0.95) translateY(10px); transition: transform 0.2s ease; }
        .cyber-overlay.active .cyber-modal { transform: scale(1) translateY(0); }
        .cyber-modal-title { font-weight: bold; font-size: 1.1rem; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; color: #8be9fd; }
        .cyber-modal-msg { color: #f8f8f2; font-size: 0.9rem; line-height: 1.5; margin-bottom: 20px;}
        .cyber-modal-actions { display: flex; justify-content: flex-end; gap: 12px; }
        .btn-modal { padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; border: 1px solid; transition: all 0.2s; background: transparent; font-family: inherit;}
        .btn-modal.cancel { border-color: #6272a4; color: #6272a4; }
        .btn-modal.cancel:hover { background: #44475a; color: #f8f8f2; }
        .btn-modal.confirm { border-color: #bd93f9; color: #bd93f9; background: rgba(189, 147, 249, 0.1); }
        .btn-modal.confirm:hover { background: #bd93f9; color: #282a36; }
        .cyber-input { width: 100%; padding: 12px; background: #0E0D11; border: 1px solid #44475a; color: #f8f8f2; border-radius: 8px; box-sizing: border-box; font-family: inherit; margin-bottom: 20px; outline: none; transition: border-color 0.2s;}
        .cyber-input:focus { border-color: #bd93f9; box-shadow: 0 0 10px rgba(189, 147, 249, 0.2); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center pb-16 relative">

    <header class="fixed top-0 w-full z-50 bg-dracula-dark border-b border-[#ffffff1a] shadow-lg flex flex-col">
        
        <div class="max-w-7xl w-full mx-auto px-4 md:px-6 py-3 flex flex-wrap items-center justify-between gap-4">
            
            <div class="flex items-center justify-between w-full md:w-auto">
                <a href="#" onclick="window.scrollTo(0,0)" class="flex items-center gap-2 group flex-shrink-0">
                    <img src="./logo.png" alt="Logo" class="w-8 h-8 rounded border border-dracula-purple/50 object-cover shadow-[0_0_10px_rgba(189,147,249,0.2)]" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <i class="fa-solid fa-cube text-dracula-purple text-2xl hidden"></i>
                    <span class="text-xl font-bold text-dracula-fg tracking-tight group-hover:text-dracula-pink transition-colors">
                        37°<span class="text-dracula-purple ml-1">NAV</span>
                    </span>
                </a>
                <button id="auth-btn-mobile" class="md:hidden text-sm bg-dracula-purple hover:bg-dracula-pink text-dracula-dark font-bold px-3 py-1.5 rounded-lg transition-colors shadow-lg">
                    <i class="fa-solid fa-lock"></i>
                </button>
            </div>
            
            <div class="flex-1 w-full md:w-auto flex flex-col md:flex-row items-center gap-3 order-3 md:order-2">
                <form id="web-search-form" class="flex-1 w-full flex items-center bg-dracula-bg hover:bg-[#343746] border border-dracula-current rounded-lg px-3 py-2 md:py-1.5 transition-colors focus-within:border-dracula-purple focus-within:bg-dracula-bg shadow-inner">
                    <select id="engine-select" class="bg-transparent text-dracula-fg text-sm outline-none cursor-pointer pr-2 border-r border-dracula-current">
                        <option value="https://www.google.com/search?q=">Google</option>
                        <option value="https://www.bing.com/search?q=">Bing</option>
                        <option value="https://github.com/search?q=">GitHub</option>
                    </select>
                    <input type="text" id="web-search-input" placeholder="Search the web..." required class="flex-1 bg-transparent text-dracula-fg text-sm outline-none px-3 placeholder-dracula-comment w-full">
                    <button type="submit" class="text-dracula-comment hover:text-dracula-fg transition-colors"><i class="fa-solid fa-arrow-right-to-bracket"></i></button>
                </form>
                
                <div class="flex-1 w-full flex items-center bg-dracula-bg hover:bg-[#343746] border border-dracula-current rounded-lg px-3 py-2 md:py-1.5 transition-colors focus-within:border-dracula-pink focus-within:bg-dracula-bg relative shadow-inner">
                    <i class="fa-solid fa-robot text-dracula-comment text-sm"></i>
                    <input type="text" id="ai-filter-input" placeholder="AI Filter & Search..." class="flex-1 bg-transparent text-dracula-fg text-sm outline-none px-3 placeholder-dracula-comment w-full">
                    <kbd class="hidden xl:inline-block bg-dracula-current text-dracula-fg text-[10px] px-1.5 py-0.5 rounded ml-2 font-mono border border-[#55586b] shadow-sm">⌘K</kbd>
                </div>
            </div>

            <div class="hidden md:flex items-center gap-4 flex-shrink-0 order-2 md:order-3">
                <a href="/admin.html" id="admin-link" target="_blank" class="hidden text-sm text-dracula-comment hover:text-dracula-fg font-semibold transition-colors">
                    <i class="fa-solid fa-server mr-1"></i>Console
                </a>
                <button id="auth-btn-pc" class="text-sm bg-dracula-purple hover:bg-dracula-pink text-dracula-dark font-bold px-4 py-1.5 rounded-lg transition-colors flex items-center gap-2 shadow-lg shadow-dracula-purple/20">
                    <i class="fa-solid fa-lock"></i><span>SYS_OP</span>
                </button>
            </div>
        </div>

        <div class="w-full border-t border-dracula-current/50 bg-dracula-dark/95">
            <div class="max-w-7xl mx-auto px-4 md:px-6">
                <div id="nav-categories" class="flex items-center gap-2 overflow-x-auto py-2.5 no-scrollbar text-sm font-medium text-dracula-comment">
                    <span class="text-xs">Syncing telemetry data...</span>
                </div>
            </div>
        </div>
    </header>

    <main class="w-full max-w-7xl flex flex-col gap-10 pt-48 md:pt-36 px-6">
        <div id="dynamic-zones" class="flex flex-col gap-12"></div>
    </main>

    <footer class="fixed bottom-0 left-0 w-full h-10 bg-dracula-dark border-t border-dracula-current flex items-center justify-between px-6 z-40">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-heart-pulse text-dracula-green animate-pulse text-base"></i>
            <span class="text-xs font-bold text-dracula-green tracking-wider hidden sm:inline">TELEMETRY_LINK_ACTIVE</span>
        </div>
        <div id="hud-uptime" class="text-xs font-bold text-dracula-purple tracking-wider"></div>
    </footer>

    <div id="sys-modal-root"></div>

    <script>
        /* =========================================================
           UI 引擎与数据逻辑 (完美适配)
           ========================================================= */
        const SysUI = {
            createContainer(id) {
                const existing = document.getElementById(id);
                if(existing) existing.remove();
                const overlay = document.createElement('div');
                overlay.id = id; overlay.className = 'cyber-overlay';
                document.getElementById('sys-modal-root').appendChild(overlay);
                return overlay;
            },
            close(overlay) {
                overlay.classList.remove('active');
                setTimeout(() => overlay.remove(), 250);
            },
            showPrompt(title, msg, type = 'text') {
                return new Promise(resolve => {
                    const overlay = this.createContainer('cyber-prompt');
                    overlay.innerHTML = `
                        <div class="cyber-modal">
                            <div class="cyber-modal-title"><i class="fa-solid fa-terminal"></i> ${title}</div>
                            <div class="cyber-modal-msg">${msg}</div>
                            <input type="${type}" id="prompt-input" class="cyber-input" autocomplete="off">
                            <div class="cyber-modal-actions">
                                <button class="btn-modal cancel" id="p-cancel">Cancel</button>
                                <button class="btn-modal confirm" id="p-ok">Authorize</button>
                            </div>
                        </div>
                    `;
                    requestAnimationFrame(() => overlay.classList.add('active'));
                    const input = overlay.querySelector('#prompt-input');
                    input.focus();
                    overlay.querySelector('#p-cancel').onclick = () => { this.close(overlay); resolve(null); };
                    overlay.querySelector('#p-ok').onclick = () => { this.close(overlay); resolve(input.value); };
                    input.addEventListener('keypress', (e) => { if(e.key === 'Enter') overlay.querySelector('#p-ok').click(); });
                });
            },
            showConfirm(title, msg, isDanger = false) {
                return new Promise(resolve => {
                    const overlay = this.createContainer('cyber-confirm');
                    const themeColor = isDanger ? '#ff5555' : '#50fa7b';
                    const btnClass = isDanger ? 'danger' : 'confirm';
                    const icon = isDanger ? 'fa-triangle-exclamation' : 'fa-circle-check';
                    overlay.innerHTML = `
                        <div class="cyber-modal" style="border-color:${themeColor}">
                            <div class="cyber-modal-title" style="color:${themeColor};"><i class="fa-solid ${icon}"></i> ${title}</div>
                            <div class="cyber-modal-msg">${msg}</div>
                            <div class="cyber-modal-actions">
                                <button class="btn-modal cancel" id="c-cancel">Cancel</button>
                                <button class="btn-modal ${btnClass}" id="c-ok">Confirm</button>
                            </div>
                        </div>
                    `;
                    requestAnimationFrame(() => overlay.classList.add('active'));
                    overlay.querySelector('#c-cancel').onclick = () => { this.close(overlay); resolve(false); };
                    overlay.querySelector('#c-ok').onclick = () => { this.close(overlay); resolve(true); };
                });
            }
        };

        let globalCategories = [];
        let globalNodes = [];
        let isAdmin = sessionStorage.getItem('sys_op_token') === 'AUTHORIZED';
        const dynamicZones = document.getElementById('dynamic-zones');
        const navCatContainer = document.getElementById('nav-categories');

        async function fetchSystemData() {
            try {
                const [catRes, nodeRes] = await Promise.all([ fetch('/api/categories'), fetch('/api/nodes') ]);
                globalCategories = await catRes.json();
                globalNodes = await nodeRes.json();
                renderNavbarCategories();
                renderCategorizedNodes(globalNodes);
            } catch (e) {
                dynamicZones.innerHTML = '<p class="text-dracula-red">> [FATAL] 数据库核心链路断开。</p>';
            }
        }

        // 渲染顶部镶嵌的分类导航条 (Dracula 链接样式)
        function renderNavbarCategories() {
            if(globalCategories.length === 0) {
                navCatContainer.innerHTML = '<span>No categories found.</span>';
                return;
            }
            navCatContainer.innerHTML = globalCategories.map(c => `
                <a href="#cat-${c.name}" class="px-3 py-1.5 rounded-lg transition-colors whitespace-nowrap hover:bg-dracula-current/50 hover:text-dracula-fg">
                    ${c.name}
                </a>
            `).join('');
        }

        function renderCategorizedNodes(nodes, isAiSearch = false) {
            dynamicZones.innerHTML = '';
            
            if (isAiSearch) {
                if (nodes.length === 0) return dynamicZones.innerHTML = '<p class="text-dracula-comment">> 神经元未匹配到相关结果。</p>';
                const zone = document.createElement('div');
                zone.innerHTML = `
                    <div class="flex items-center gap-3 mb-6">
                        <h2 class="text-2xl font-bold text-dracula-pink">AI 检索结果</h2>
                        <div class="h-px bg-dracula-pink/30 flex-grow"></div>
                    </div>`;
                zone.appendChild(buildGrid(nodes, 'pink'));
                dynamicZones.appendChild(zone);
                return;
            }

            if (nodes.length === 0) return dynamicZones.innerHTML = '<p class="text-dracula-comment">> 扫描未命中任何战术节点。</p>';

            const grouped = {};
            globalCategories.forEach(c => grouped[c.name] = []);
            nodes.forEach(n => {
                if(!grouped[n.category]) grouped[n.category] = [];
                grouped[n.category].push(n);
            });

            for (const [catName, catNodes] of Object.entries(grouped)) {
                if (catNodes.length === 0) continue;
                const zone = document.createElement('div');
                // 丝滑滚动锚点支持：预留顶部导航栏高度
                zone.id = `cat-${catName}`;
                zone.className = "scroll-mt-48 md:scroll-mt-36"; 
                zone.innerHTML = `
                    <div class="flex items-center gap-3 mb-6">
                        <h2 class="text-2xl font-bold text-dracula-cyan">${catName}</h2>
                        <div class="h-px bg-dracula-cyan/20 flex-grow"></div>
                    </div>`;
                zone.appendChild(buildGrid(catNodes, 'cyan'));
                dynamicZones.appendChild(zone);
            }
        }

        function buildGrid(nodesArray, theme = 'cyan') {
            const grid = document.createElement('div');
            grid.className = 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6';
            
            // Dracula Theme 配色映射
            const tColor = theme === 'pink' ? 'text-dracula-pink' : 'text-dracula-cyan';
            const bColor = theme === 'pink' ? 'hover:border-dracula-pink/50' : 'hover:border-dracula-cyan/50';
            const bgLight = theme === 'pink' ? 'bg-dracula-pink/10' : 'bg-dracula-cyan/10';

            nodesArray.forEach(link => {
                const card = document.createElement('a');
                card.href = link.url; card.target = '_blank';
                card.className = `relative glass-panel rounded-xl p-5 flex items-center gap-4 hover:bg-white/5 ${bColor} transition-all duration-300 group w-full min-w-0 overflow-hidden block`;
                
                const iconPreview = link.icon && link.icon.startsWith('http')
                    ? `<img src="${link.icon}" loading="lazy" alt="icon" class="w-10 h-10 rounded-md object-contain filter drop-shadow-md group-hover:scale-110 transition-transform duration-300" onerror="this.onerror=null; this.outerHTML='<i class=\\'fa-solid fa-link text-xl group-hover:scale-110 transition-transform duration-300\\'></i>'">`
                    : `<i class="${link.icon || 'fa-solid fa-link'} text-xl group-hover:scale-110 transition-transform duration-300"></i>`;

                const adminHtml = isAdmin ? `
                    <div class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity z-10">
                        <button onclick="deleteNode(event, ${link.id}, '${link.title.replace(/'/g, "\\'")}')" class="text-xs text-dracula-red hover:text-white bg-dracula-dark border border-dracula-current px-2 py-1 rounded shadow"><i class="fa-solid fa-trash"></i></button>
                    </div>` : '';

                card.innerHTML = `
                    ${adminHtml}
                    <div class="flex-shrink-0 w-12 h-12 ${bgLight} rounded-lg flex items-center justify-center ${tColor} shadow-inner">
                        ${iconPreview}
                    </div>
                    <div class="flex-1 min-w-0">
                        <h3 class="text-base font-medium text-dracula-fg truncate group-hover:${tColor} transition-colors">${link.title}</h3>
                        <p class="text-xs text-dracula-comment truncate mt-1">${link.description || '暂无特征数据'}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
            return grid;
        }

        // =====================================
        // 系统鉴权与业务交互
        // =====================================
        function updateAdminUI() {
            const btns = [document.getElementById('auth-btn-pc'), document.getElementById('auth-btn-mobile')];
            const adminLink = document.getElementById('admin-link');
            btns.forEach(btn => {
                if(!btn) return;
                if (isAdmin) {
                    btn.innerHTML = btn.id.includes('pc') ? '<i class="fa-solid fa-unlock mr-2"></i>LOGOUT' : '<i class="fa-solid fa-unlock"></i>';
                    btn.className = "text-sm bg-dracula-red hover:bg-[#ff7373] text-dracula-dark font-bold px-4 py-1.5 rounded-lg transition-colors shadow-lg";
                } else {
                    btn.innerHTML = btn.id.includes('pc') ? '<i class="fa-solid fa-lock mr-2"></i>SYS_OP' : '<i class="fa-solid fa-lock"></i>';
                    btn.className = "text-sm bg-dracula-purple hover:bg-dracula-pink text-dracula-dark font-bold px-4 py-1.5 rounded-lg transition-colors shadow-lg";
                }
            });
            if(isAdmin) adminLink.classList.remove('hidden');
            else adminLink.classList.add('hidden');
            renderCategorizedNodes(globalNodes);
        }

        async function handleAuth() {
            if (isAdmin) { 
                sessionStorage.removeItem('sys_op_token'); isAdmin = false; 
            } else { 
                const pwd = await SysUI.showPrompt('System Auth', '请输入超级管理员密钥:', 'password');
                if (pwd === 'root') { sessionStorage.setItem('sys_op_token', 'AUTHORIZED'); isAdmin = true; } 
                else if (pwd !== null) { await SysUI.showConfirm('Access Denied', '密钥无效，连接已被拒绝。', true); }
            }
            updateAdminUI();
        }

        document.getElementById('auth-btn-pc').addEventListener('click', handleAuth);
        document.getElementById('auth-btn-mobile').addEventListener('click', handleAuth);

        window.deleteNode = async function(e, id, title) {
            e.preventDefault(); 
            const confirm = await SysUI.showConfirm('抹除节点', `确定要永久销毁 [ ${title} ] 吗？`, true);
            if (!confirm) return;
            try {
                const response = await fetch('/api/nodes', { method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id }) });
                if (response.ok) fetchSystemData();
            } catch (error) {}
        };

        // =====================================
        // 搜索引擎接入
        // =====================================
        let aiTimeout = null;
        document.getElementById('ai-filter-input').addEventListener('input', (e) => {
            clearTimeout(aiTimeout);
            const query = e.target.value.trim();
            if (!query) { renderCategorizedNodes(globalNodes); return; }
            
            const localFiltered = globalNodes.filter(n => n.title.toLowerCase().includes(query.toLowerCase()) || (n.description && n.description.toLowerCase().includes(query.toLowerCase())));
            renderCategorizedNodes(localFiltered);

            aiTimeout = setTimeout(async () => {
                try {
                    const res = await fetch('/api/search?q=' + encodeURIComponent(query));
                    const aiNodes = await res.json();
                    renderCategorizedNodes(aiNodes, true); 
                } catch(e) {}
            }, 800);
        });

        document.getElementById('web-search-form').addEventListener('submit', (e) => {
            e.preventDefault();
            window.open(document.getElementById('engine-select').value + encodeURIComponent(document.getElementById('web-search-input').value), '_blank');
        });

        const gTime = new Date('2024-01-01T00:00:00Z').getTime();
        setInterval(() => {
            const d = new Date().getTime() - gTime;
            document.getElementById('hud-uptime').textContent = `系统存活 ${Math.floor(d/86400000)}天 ${Math.floor((d%86400000)/3600000)}时`;
        }, 60000); 
        const dInit = new Date().getTime() - gTime;
        document.getElementById('hud-uptime').textContent = `系统存活 ${Math.floor(dInit/86400000)}天 ${Math.floor((dInit%86400000)/3600000)}时`;

        updateAdminUI();
        fetchSystemData();
    </script>
</body>
</html>
