<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>37° Nav - 星际指挥中心</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 定义全局主题颜色 */
        :root {
            --bg-dark: #0f1115; /* 极深灰背景 */
            --brand-cyan: #00f2fe; /* 赛博青色 */
            --brand-lime: #4facfe; /* 亮蓝色 */
            --brand-purple: #b026ff; /* 霓虹紫 */
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-hover: rgba(255, 255, 255, 0.08);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            /* 顶部添加一点神秘的微光渐变 */
            background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, transparent 50%);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* 顶部欢迎区域 */
        .hero {
            padding: 60px 0;
            border-bottom: 1px solid var(--glass-border);
            margin-bottom: 40px;
        }
        .hero h1 {
            font-size: 3.5rem;
            margin: 0 0 15px 0;
            letter-spacing: -1px;
        }
        .hero h1 span.cyan { color: var(--brand-cyan); }
        .hero p {
            color: var(--text-muted);
            font-size: 1.2rem;
            max-width: 600px;
            line-height: 1.6;
        }

        /* 分类标题 */
        .category-title {
            font-size: 1.8rem;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .category-title i { font-size: 1.2rem; color: var(--brand-cyan); }

        /* 网格布局 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 60px;
        }

        /* 核心：毛玻璃卡片设计 */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
            text-decoration: none;
            display: flex;
            align-items: flex-start;
            gap: 15px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .glass-card:hover {
            background: var(--glass-hover);
            transform: translateY(-3px);
            border-color: var(--brand-cyan);
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.05);
        }

        /* 卡片内图标 */
        .icon-box {
            width: 45px;
            height: 45px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            background: rgba(0, 242, 254, 0.1);
            color: var(--brand-cyan);
            flex-shrink: 0;
        }
        
        /* 紫色系卡片样式 */
        .glass-card.purple:hover { border-color: var(--brand-purple); box-shadow: 0 10px 20px rgba(176, 38, 255, 0.05); }
        .glass-card.purple .icon-box { background: rgba(176, 38, 255, 0.1); color: var(--brand-purple); }

        /* 卡片文字 */
        .card-content { flex: 1; }
        .card-title {
            color: var(--text-main);
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0 0 8px 0;
            transition: color 0.3s ease;
        }
        .card-desc {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin: 0;
            line-height: 1.4;
        }
        .glass-card:hover .card-title { color: var(--brand-cyan); }
        .glass-card.purple:hover .card-title { color: var(--brand-purple); }

        /* 加载状态文字 */
        .loading-text {
            color: var(--brand-cyan);
            font-family: 'Courier New', Courier, monospace;
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="hero">
            <h1>Welcome to <br> 37° <span class="cyan">Nav</span></h1>
            <p>星际指挥中心已启动。汇聚全网优质资源，极速响应，零运维的 Serverless 导航中枢。</p>
        </div>

        <h2 class="category-title"><i class="fa-solid fa-satellite-dish"></i> 信号接收中...</h2>
        
        <div class="grid" id="nav-grid">
            <p class="loading-text">> 正在从 D1 数据库同步节点信息，请稍候...</p>
        </div>
    </div>

    <script>
        async function loadLinks() {
            const grid = document.getElementById('nav-grid');
            const titleIcon = document.querySelector('.category-title');
            
            try {
                // 向我们的后端 API 请求数据
                const response = await fetch('/api/links');
                
                if (!response.ok) {
                    throw new Error('网络响应异常');
                }
                
                const links = await response.json();
                
                // 清空“加载中”的提示
                grid.innerHTML = ''; 
                // 修改标题
                titleIcon.innerHTML = '<i class="fa-solid fa-radar"></i> 已连接节点';

                // 遍历数据库里的数据，生成卡片
                links.forEach(link => {
                    // 判断数据库里存的颜色主题是不是 purple
                    const isPurple = link.color_theme === 'purple' ? 'purple' : '';
                    
                    const cardHtml = `
                        <a href="${link.url}" target="_blank" class="glass-card ${isPurple}">
                            <div class="icon-box"><i class="${link.icon}"></i></div>
                            <div class="card-content">
                                <h3 class="card-title">${link.title}</h3>
                                <p class="card-desc">${link.description}</p>
                            </div>
                        </a>
                    `;
                    grid.innerHTML += cardHtml;
                });

                // 如果数据库里一条数据都没有
                if (links.length === 0) {
                    grid.innerHTML = '<p class="loading-text" style="color: var(--text-muted);">> 数据库中暂无数据记录。</p>';
                }

            } catch (error) {
                console.error("数据加载失败:", error);
                grid.innerHTML = '<p class="loading-text" style="color: #ff4757;">> [错误] 无法连接到 D1 数据库。请检查 API 配置。</p>';
            }
        }

        // 页面加载完毕后立即执行
        window.onload = loadLinks;
    </script>
</body>
</html>
