<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>37° Nav | 战术遥测终端</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dracula: {
                            dark: '#1E1F29', bg: '#282A36', current: '#44475A', fg: '#F8F8F2', comment: '#6272A4',
                            cyan: '#8BE9FD', green: '#50FA7B', pink: '#FF79C6', purple: '#BD93F9', red: '#FF5555', yellow: '#F1FA8C'
                        }
                    },
                    fontFamily: { mono: ['"JetBrains Mono"', 'monospace'] }
                }
            }
        }
    </script>

    <style>
        html { scroll-behavior: smooth; }
        body {
            background-color: #282A36;
            background-image: linear-gradient(rgba(139, 233, 253, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(139, 233, 253, 0.02) 1px, transparent 1px);
            background-size: 30px 30px; background-attachment: fixed;
            font-family: 'JetBrains Mono', monospace; -webkit-font-smoothing: antialiased;
            color: #F8F8F2; margin-bottom: 50px;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1E1F29; }
        ::-webkit-scrollbar-thumb { background: #6272A4; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #BD93F9; }

        /* ========================================================
           赛博跑马灯卡片引擎 (序列充能 + 全边框点火特效)
           ======================================================== */
        @property --bg-angle {
            syntax: "<angle>";
            inherits: false;
            initial-value: 0deg;
        }

        @keyframes spin-border {
            0% { --bg-angle: 0deg; }
            100% { --bg-angle: 360deg; }
        }

        .node-card { 
            border: 1px solid rgba(255, 255, 255, 0.04); 
            background: rgba(68, 71, 90, 0.25);
            backdrop-filter: blur(12px);
            border-radius: 14px;
            position: relative;
            transition: border-color 0.3s ease, box-shadow 0.3s ease, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        
        .node-card:hover { 
            border-color: var(--card-color); 
            box-shadow: 0 0 15px -2px var(--card-color), inset 0 0 8px -3px var(--card-color);
            transform: translateY(-3px); 
            transition: border-color 0.4s ease 0.55s, box-shadow 0.4s ease 0.55s, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0s;
        }
        .node-card:hover .node-title { color: var(--card-color); }
        
        .node-card::before {
            content: '';
            position: absolute;
            inset: -1px; 
            border-radius: 15px; 
            padding: 1px; 
            background: conic-gradient(from var(--bg-angle), transparent 50%, var(--card-color) 100%);
            
            /* 【修复核心】：补齐标准 mask 属性，消除 VS Code 警告，完美兼容所有浏览器 */
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 10;
        }

        .node-card:hover::before {
            opacity: 1;
            animation: spin-border 0.65s cubic-bezier(0.2, 0.8, 0.2, 1) 1 forwards; 
        }

        /* ========================================================
           图标物理引擎
           ======================================================== */
        .card-icon {
            width: 46px; 
            height: 46px;
            object-fit: contain; 
            border-radius: 12px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4));
            position: relative; 
            z-index: 1;
        }
        
        .node-card:hover .card-icon {
            transform: scale(1.1) translateY(-2px);
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.75));
        }

        .search-dropdown-wrapper { position: relative; }
        .search-dropdown-menu { position: absolute; top: 100%; left: -5px; padding-top: 10px; display: none; z-index: 100;}
        .search-dropdown-wrapper:hover .search-dropdown-menu { display: block; }
        .search-dropdown-content { background: #1E1F29; border: 1px solid #44475A; border-radius: 6px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.5);}
        .search-opt { padding: 8px 15px; cursor: pointer; color: #6272A4; transition: all 0.2s; display: flex; justify-content: center;}
        .search-opt:hover { background: #44475A; color: #8BE9FD; }

        .cyber-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; }
        .cyber-overlay.active { opacity: 1; pointer-events: all; }
        .cyber-modal { position: relative; background: #282A36; border: 1px solid #BD93F9; box-shadow: 0 0 30px rgba(189, 147, 249, 0.2); border-radius: 12px; padding: 25px; width: 90%; max-width: 400px; transform: scale(0.95); transition: transform 0.2s ease; }
        .cyber-overlay.active .cyber-modal { transform: scale(1); }
        .modal-close-x { position: absolute; top: 15px; right: 20px; color: #6272A4; font-size: 1.2rem; cursor: pointer; transition: color 0.2s; }
        .modal-close-x:hover { color: #FF5555; }
        .btn-modal { padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; border: 1px solid; transition: all 0.2s; background: transparent; font-family: inherit;}
        .btn-modal.cancel { border-color: #6272A4; color: #6272A4; }
        .btn-modal.cancel:hover { background: #44475A; color: #F8F8F2; }
        .btn-modal.confirm { border-color: #BD93F9; color: #BD93F9; background: rgba(189, 147, 249, 0.1); }
        .btn-modal.confirm:hover { background: #BD93F9; color: #282A36; }
        .cyber-input { width: 100%; padding: 12px; background: #1E1F29; border: 1px solid #44475A; color: #F8F8F2; border-radius: 6px; box-sizing: border-box; margin-bottom: 20px; outline: none; transition: border-color 0.2s;}
        .cyber-input:focus { border-color: #8BE9FD; }

        .sharp-heart { text-shadow: 0 0 3px rgba(255, 85, 85, 0.3); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center pb-16 relative">

    <header class="fixed top-0 w-full z-50 bg-dracula-bg/95 backdrop-blur-md border-b border-dracula-current h-16 shadow-lg shadow-black/20">
        <div class="max-w-[1400px] h-full mx-auto px-4 flex items-center justify-between gap-4">
            
            <div class="flex items-center gap-2 md:gap-6 h-full flex-1 min-w-0">
                <a href="#" onclick="window.scrollTo(0,0)" class="flex items-center gap-2 flex-shrink-0 group">
                    <div class="w-8 h-8 rounded border border-dracula-purple/50 flex items-center justify-center bg-dracula-current overflow-hidden">
                        <img src="./logo.png" alt="Logo" class="w-full h-full object-cover" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                        <i class="fa-solid fa-cube text-dracula-cyan hidden text-sm"></i>
                    </div>
                    <span class="text-lg font-bold text-dracula-fg tracking-tight hidden sm:block group-hover:text-dracula-pink transition-colors">37°<span class="text-dracula-purple">NAV</span></span>
                </a>
                
                <div id="nav-categories" class="flex items-center gap-1 h-full overflow-x-auto no-scrollbar flex-1 mask-edges text-sm font-medium">
                    <span class="text-dracula-comment text-xs">Syncing...</span>
                </div>
            </div>

            <div class="flex items-center gap-3 flex-shrink-0">
                <div class="hidden lg:flex items-center bg-dracula-dark/80 border border-dracula-current rounded-lg p-1 transition-colors focus-within:border-dracula-purple focus-within:bg-dracula-dark">
                    <form id="web-search-form" class="flex items-center border-r border-dracula-comment/40 px-1 relative">
                        <div class="search-dropdown-wrapper">
                            <div class="flex items-center gap-1 cursor-pointer text-dracula-comment hover:text-dracula-cyan px-2 py-1 transition-colors">
                                <i id="current-engine-icon" class="fa-brands fa-google text-sm"></i>
                                <i class="fa-solid fa-caret-down text-[10px]"></i>
                            </div>
                            <div class="search-dropdown-menu">
                                <div class="search-dropdown-content">
                                    <div class="search-opt" data-url="https://www.google.com/search?q=" data-icon="fa-google"><i class="fa-brands fa-google"></i></div>
                                    <div class="search-opt" data-url="https://www.bing.com/search?q=" data-icon="fa-microsoft"><i class="fa-brands fa-microsoft"></i></div>
                                    <div class="search-opt" data-url="https://github.com/search?q=" data-icon="fa-github"><i class="fa-brands fa-github"></i></div>
                                </div>
                            </div>
                        </div>
                        <input type="text" id="web-search-input" placeholder="Search..." required class="bg-transparent text-dracula-fg text-sm outline-none px-2 w-20 focus:w-32 transition-all placeholder-dracula-comment">
                        <button type="submit" class="text-dracula-comment hover:text-dracula-pink pr-1 transition-colors"><i class="fa-solid fa-arrow-right-to-bracket"></i></button>
                    </form>
                    <div class="flex items-center pl-2 pr-1 relative">
                        <i class="fa-solid fa-robot text-dracula-comment text-sm"></i>
                        <input type="text" id="ai-filter-input" placeholder="AI Filter..." class="bg-transparent text-dracula-fg text-sm outline-none px-2 w-24 focus:w-36 transition-all placeholder-dracula-comment">
                        <kbd class="text-[10px] text-dracula-fg bg-dracula-current rounded px-1 border border-[#55586B]">⌘K</kbd>
                    </div>
                </div>
                
                <a href="/admin.html" id="admin-link" target="_blank" class="hidden text-sm text-dracula-comment hover:text-dracula-cyan font-bold transition-colors border border-transparent hover:border-dracula-cyan/30 px-2 py-1 rounded">
                    <i class="fa-solid fa-server mr-1"></i>Console
                </a>
                <button id="auth-btn" class="text-sm bg-dracula-purple hover:bg-dracula-pink text-dracula-dark font-bold px-3 py-1.5 rounded-lg transition-colors flex items-center gap-1.5">
                    <i class="fa-solid fa-lock"></i><span class="hidden sm:inline">SYS_OP</span>
                </button>
            </div>
        </div>
    </header>

    <main class="w-full max-w-7xl flex flex-col gap-12 pt-28 px-6">
        <div id="dynamic-zones" class="flex flex-col gap-12"></div>
    </main>

    <footer class="fixed bottom-0 left-0 w-full h-10 bg-dracula-dark border-t border-dracula-current flex items-center justify-center px-6 z-40">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-heart-pulse text-dracula-red animate-pulse text-base sharp-heart"></i>
            <span id="hud-uptime" class="text-xs font-bold text-dracula-comment tracking-wider"></span>
        </div>
    </footer>

    <div id="sys-modal-root"></div>

    <script>
        // ==========================================
        // 核心安全工具函数 (防止 XSS 注入)
        // ==========================================
        function esc(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function sanitizeUrl(url) {
            if (!url) return '#';
            try {
                // 仅允许 http 和 https 协议，过滤掉 javascript: 等危险协议
                const parsed = new URL(url, window.location.origin);
                if (parsed.protocol === 'http:' || parsed.protocol === 'https:') {
                    return parsed.href;
                }
                return '#';
            } catch (e) {
                // 如果 URL 不合法（例如纯字母），也退回到安全锚点
                return '#';
            }
        }

        const SysUI = {
            createContainer(id) {
                const existing = document.getElementById(id);
                if(existing) existing.remove();
                const overlay = document.createElement('div');
                overlay.id = id; overlay.className = 'cyber-overlay';
                document.getElementById('sys-modal-root').appendChild(overlay);
                return overlay;
            },
            close(overlay) {
                overlay.classList.remove('active');
                setTimeout(() => overlay.remove(), 250);
            },
            showPrompt(title, msg, type = 'text') {
                return new Promise(resolve => {
                    const overlay = this.createContainer('cyber-prompt');
                    overlay.innerHTML = `
                        <div class="cyber-modal">
                            <i class="fa-solid fa-xmark modal-close-x" id="p-close-x"></i>
                            <div class="cyber-modal-title" style="color:var(--dracula-cyan);"><i class="fa-solid fa-terminal"></i> ${esc(title)}</div>
                            <div class="cyber-modal-msg" style="color:var(--dracula-fg); margin-bottom:15px;">${msg}</div>
                            <input type="${type}" id="prompt-input" class="cyber-input" autocomplete="off">
                            <div class="cyber-modal-actions">
                                <button class="btn-modal cancel" id="p-cancel">Cancel</button>
                                <button class="btn-modal confirm" id="p-ok">Authorize</button>
                            </div>
                        </div>`;
                    requestAnimationFrame(() => overlay.classList.add('active'));
                    const input = overlay.querySelector('#prompt-input');
                    input.focus();
                    const cancelLogic = () => { this.close(overlay); resolve(null); };
                    overlay.querySelector('#p-cancel').onclick = cancelLogic;
                    overlay.querySelector('#p-close-x').onclick = cancelLogic;
                    overlay.querySelector('#p-ok').onclick = () => { this.close(overlay); resolve(input.value); };
                    input.addEventListener('keypress', (e) => { if(e.key === 'Enter') overlay.querySelector('#p-ok').click(); });
                });
            },
            showConfirm(title, msg, isDanger = false) {
                return new Promise(resolve => {
                    const overlay = this.createContainer('cyber-confirm');
                    const themeColor = isDanger ? '#FF5555' : '#50FA7B';
                    const btnClass = isDanger ? 'danger' : 'confirm';
                    const icon = isDanger ? 'fa-triangle-exclamation' : 'fa-circle-check';
                    overlay.innerHTML = `
                        <div class="cyber-modal" style="border-color:${themeColor}">
                            <i class="fa-solid fa-xmark modal-close-x" id="c-close-x"></i>
                            <div class="cyber-modal-title" style="color:${themeColor};"><i class="fa-solid ${icon}"></i> ${esc(title)}</div>
                            <div class="cyber-modal-msg" style="color:var(--dracula-fg); margin-bottom:20px;">${msg}</div>
                            <div class="cyber-modal-actions">
                                <button class="btn-modal cancel" id="c-cancel">Cancel</button>
                                <button class="btn-modal ${btnClass}" id="c-ok">Confirm</button>
                            </div>
                        </div>`;
                    requestAnimationFrame(() => overlay.classList.add('active'));
                    const cancelLogic = () => { this.close(overlay); resolve(false); };
                    overlay.querySelector('#c-cancel').onclick = cancelLogic;
                    overlay.querySelector('#c-close-x').onclick = cancelLogic;
                    overlay.querySelector('#c-ok').onclick = () => { this.close(overlay); resolve(true); };
                });
            }
        };

        let globalCategories = [];
        let globalNodes = [];
        let isAdmin = sessionStorage.getItem('sys_op_token') !== null;
        const dynamicZones = document.getElementById('dynamic-zones');
        const navCatContainer = document.getElementById('nav-categories');
        const draculaColors = ['#8BE9FD', '#50FA7B', '#FF79C6', '#BD93F9', '#FF5555', '#F1FA8C', '#FFB86C'];

        function getHashColor(str) {
            if (!str) return '#6272A4';
            let hash = 0;
            for (let i = 0, len = str.length; i < len; i++) { hash = str.charCodeAt(i) + ((hash << 5) - hash); }
            return draculaColors[Math.abs(hash) % draculaColors.length];
        }

        let activeSearchUrl = "https://www.google.com/search?q=";
        document.querySelectorAll('.search-opt').forEach(opt => {
            opt.addEventListener('click', function() {
                activeSearchUrl = this.getAttribute('data-url');
                document.getElementById('current-engine-icon').className = `fa-brands ${this.getAttribute('data-icon')} text-sm`;
                document.getElementById('web-search-input').focus();
            });
        });
        document.getElementById('web-search-form').addEventListener('submit', (e) => {
            e.preventDefault();
            window.open(activeSearchUrl + encodeURIComponent(document.getElementById('web-search-input').value), '_blank');
        });

        async function fetchSystemData() {
            try {
                const [catRes, nodeRes] = await Promise.all([ fetch('/api/categories'), fetch('/api/nodes') ]);
                globalCategories = await catRes.json();
                globalNodes = await nodeRes.json();
                renderNavbarCategories();
                renderCategorizedNodes(globalNodes);
            } catch (e) {
                dynamicZones.innerHTML = '<p class="text-dracula-red">> [FATAL] 数据库核心链路断开。</p>';
            }
        }

        function renderNavbarCategories() {
            if(globalCategories.length === 0) return navCatContainer.innerHTML = '<span class="text-dracula-comment text-xs">No categories found.</span>';
            navCatContainer.innerHTML = globalCategories.map(c => `
                <a href="#cat-${esc(c.name).replace(/\s+/g, '-')}" class="text-dracula-comment hover:text-dracula-fg hover:bg-dracula-current/50 px-3 py-1.5 rounded-lg whitespace-nowrap transition-colors border border-transparent hover:border-dracula-current">${esc(c.name)}</a>
            `).join('');
        }

        function renderCategorizedNodes(nodes, isAiSearch = false) {
            dynamicZones.innerHTML = '';
            
            if (isAiSearch) {
                if (nodes.length === 0) return dynamicZones.innerHTML = '<p class="text-dracula-comment">> 神经元未匹配到相关结果。</p>';
                const zone = document.createElement('div');
                zone.innerHTML = `<div class="flex items-center gap-4 mb-6"><h2 class="text-2xl font-bold text-dracula-pink tracking-wide">AI 检索结果</h2><div class="h-[1px] bg-gradient-to-r from-dracula-pink/50 to-transparent flex-grow"></div></div>`;
                zone.appendChild(buildGrid(nodes));
                dynamicZones.appendChild(zone);
                return;
            }

            if (nodes.length === 0) return dynamicZones.innerHTML = '<p class="text-dracula-comment">> 扫描未命中任何战术节点。</p>';

            const grouped = {};
            globalCategories.forEach(c => grouped[c.name] = []);
            nodes.forEach(n => {
                if(!grouped[n.category]) grouped[n.category] = [];
                grouped[n.category].push(n);
            });

            const fragment = document.createDocumentFragment();
            for (const [catName, catNodes] of Object.entries(grouped)) {
                if (catNodes.length === 0) continue;
                const zone = document.createElement('div');
                zone.id = `cat-${esc(catName).replace(/\s+/g, '-')}`;
                zone.className = "scroll-mt-24"; 
                zone.innerHTML = `<div class="flex items-center gap-4 mb-6"><h2 class="text-xl font-bold text-dracula-cyan tracking-wider">${esc(catName)}</h2><div class="h-[1px] bg-gradient-to-r from-dracula-cyan/50 to-transparent flex-grow"></div></div>`;
                zone.appendChild(buildGrid(catNodes));
                fragment.appendChild(zone);
            }
            dynamicZones.appendChild(fragment);
        }

        function buildGrid(nodesArray) {
            const grid = document.createElement('div');
            grid.className = 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6';

            nodesArray.forEach(link => {
                const card = document.createElement('a');
                card.href = sanitizeUrl(link.url); card.target = '_blank';
                
                const fallbackHex = getHashColor(link.title || link.url);
                card.style.setProperty('--card-color', fallbackHex);
                card.className = `node-card p-4 flex items-center gap-4 group w-full min-w-0 block`;
                
                let iconStr = (link.icon || '').trim();
                let iconHTML = '';

                if (iconStr.startsWith('fa-')) {
                    iconHTML = `<i class="${esc(iconStr)} card-icon flex items-center justify-center text-[34px] text-dracula-fg"></i>`;
                } else {
                    let targetImgUrl = iconStr;
                    if (!targetImgUrl) {
                        try { targetImgUrl = new URL(link.url).origin + '/favicon.ico'; } 
                        catch(e) { targetImgUrl = ''; }
                    }

                    if (targetImgUrl) {
                        targetImgUrl = sanitizeUrl(targetImgUrl);
                        iconHTML = `
                            <img src="${targetImgUrl}" class="card-icon" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" loading="lazy">
                            <i class="fa-solid fa-globe card-icon hidden items-center justify-center text-[34px] text-dracula-fg"></i>`;

                        const hiddenImg = new Image();
                        hiddenImg.crossOrigin = "Anonymous";
                        hiddenImg.onload = () => {
                            const canvas = document.createElement('canvas');
                            const ctx = canvas.getContext('2d');
                            canvas.width = 32; canvas.height = 32;
                            ctx.drawImage(hiddenImg, 0, 0, 32, 32);
                            try {
                                const data = ctx.getImageData(0, 0, 32, 32).data;
                                let r=0, g=0, b=0, count=0;
                                for(let i=0; i<data.length; i+=4){
                                    if(data[i+3] < 128 || (data[i]>240 && data[i+1]>240 && data[i+2]>240) || (data[i]<15 && data[i+1]<15 && data[i+2]<15)) continue;
                                    r += data[i]; g += data[i+1]; b += data[i+2]; count++;
                                }
                                if(count > 0) card.style.setProperty('--card-color', `rgb(${Math.floor(r/count)},${Math.floor(g/count)},${Math.floor(b/count)})`);
                            } catch(e) {}
                        };
                        hiddenImg.src = targetImgUrl;
                    } else {
                        iconHTML = `<i class="fa-solid fa-globe card-icon flex items-center justify-center text-[34px] text-dracula-fg"></i>`;
                    }
                }

                const adminHtml = isAdmin ? `
                    <div class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity z-20">
                        <button onclick='deleteNode(event, ${link.id}, ${esc(JSON.stringify(link.title))})' class="text-xs text-dracula-red hover:text-white bg-dracula-dark border border-dracula-red/30 hover:bg-dracula-red px-2 py-1 rounded transition-colors"><i class="fa-solid fa-trash"></i></button>
                    </div>` : '';

                card.innerHTML = `
                    ${adminHtml}
                    <div class="relative flex-shrink-0 flex items-center justify-center z-10 w-12 h-12">
                        ${iconHTML}
                    </div>
                    <div class="flex-1 min-w-0 ml-1 z-10 relative">
                        <h3 class="node-title text-base font-bold text-dracula-fg truncate transition-colors">${esc(link.title)}</h3>
                        <p class="text-xs text-dracula-comment truncate mt-1">${esc(link.description || '暂无特征数据')}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
            return grid;
        }

        function updateAdminUI() {
            const authBtn = document.getElementById('auth-btn');
            const adminLink = document.getElementById('admin-link');
            if (isAdmin) {
                authBtn.innerHTML = '<i class="fa-solid fa-unlock"></i><span class="hidden sm:inline ml-1.5">LOGOUT</span>';
                authBtn.className = "text-sm bg-dracula-red hover:bg-[#ff7373] text-dracula-dark font-bold px-3 py-1.5 rounded-lg transition-colors flex items-center shadow-lg shadow-dracula-red/20";
                adminLink.classList.remove('hidden'); 
            } else {
                authBtn.innerHTML = '<i class="fa-solid fa-lock"></i><span class="hidden sm:inline ml-1.5">SYS_OP</span>';
                authBtn.className = "text-sm bg-dracula-purple hover:bg-dracula-pink text-dracula-dark font-bold px-3 py-1.5 rounded-lg transition-colors flex items-center shadow-lg shadow-dracula-purple/20";
                adminLink.classList.add('hidden');
            }
            renderCategorizedNodes(globalNodes);
        }

        document.getElementById('auth-btn').addEventListener('click', async () => {
            if (isAdmin) { sessionStorage.removeItem('sys_op_token'); isAdmin = false; } 
            else { 
                const pwd = await SysUI.showPrompt('系统鉴权 (SYS_AUTH)', '请输入超级管理员密钥:', 'password');
                if (pwd !== null) {
                    try {
                        const res = await fetch('/api/auth', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ password: pwd })
                        });
                        if (res.ok) {
                            const data = await res.json();
                            if (data.status === 'success') {
                                sessionStorage.setItem('sys_op_token', data.token);
                                isAdmin = true;
                            }
                        } else {
                            await SysUI.showConfirm('拦截警告', '密钥无效，操作被系统拒绝。', true);
                        }
                    } catch (e) {
                        await SysUI.showConfirm('系统错误', '无法连接鉴权服务器。', true);
                    }
                }
            }
            updateAdminUI();
        });

        // 核心修复点：为删除操作加入了鉴权 Header
        window.deleteNode = async function(e, id, title) {
            e.preventDefault(); 
            const confirm = await SysUI.showConfirm('抹除节点', `确定要永久销毁 [ ${esc(title)} ] 吗？该操作无法恢复。`, true);
            if (!confirm) return;
            try {
                const response = await fetch('/api/nodes', { 
                    method: 'DELETE', 
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${sessionStorage.getItem('sys_op_token')}`
                    }, 
                    body: JSON.stringify({ id }) 
                });
                if (response.ok) fetchSystemData();
            } catch (error) {}
        };

        let aiTimeout = null;
        document.getElementById('ai-filter-input').addEventListener('input', (e) => {
            clearTimeout(aiTimeout);
            const query = e.target.value.trim();
            if (!query) { renderCategorizedNodes(globalNodes); return; }
            const localFiltered = globalNodes.filter(n => n.title.toLowerCase().includes(query.toLowerCase()) || (n.description && n.description.toLowerCase().includes(query.toLowerCase())));
            renderCategorizedNodes(localFiltered);
            aiTimeout = setTimeout(async () => {
                try {
                    const res = await fetch('/api/search?q=' + encodeURIComponent(query));
                    const aiNodes = await res.json();
                    renderCategorizedNodes(aiNodes, true); 
                } catch(e) {}
            }, 800);
        });

        const gTime = new Date('2024-01-01T00:00:00Z').getTime();
        function updateUptime() {
            const diff = new Date().getTime() - gTime;
            const d = String(Math.floor(diff / 86400000)).padStart(2, '0');
            const h = String(Math.floor((diff % 86400000) / 3600000)).padStart(2, '0');
            const m = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
            const s = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
            document.getElementById('hud-uptime').textContent = `小破站苟且了 ${d}天${h}时${m}分${s}秒`;
        }
        setInterval(updateUptime, 1000);
        updateUptime();

        updateAdminUI();
        fetchSystemData();
    </script>
</body>
</html>
