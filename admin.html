<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>37° Nav - 舰长控制台 4.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f1115;
            --brand-cyan: #00f2fe;
            --brand-purple: #b026ff;
            --brand-red: #ff4757;
            --brand-emerald: #10b981;
            --text-main: #f3f4f6;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
            background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, transparent 50%);
            min-height: 100vh;
            box-sizing: border-box;
        }

        .admin-container { w-full; max-width: 800px; display: flex; flex-direction: column; gap: 30px; width: 100%; }
        .panel { background: var(--glass-bg); border: 1px solid var(--brand-cyan); border-radius: 12px; padding: 30px; box-shadow: 0 0 20px rgba(0, 242, 254, 0.1); }
        h2 { margin-top: 0; color: var(--brand-cyan); border-bottom: 1px solid var(--glass-border); padding-bottom: 15px;}
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--text-main); font-size: 0.9rem;}
        input, select, textarea { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: var(--brand-cyan); border-radius: 6px; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--brand-cyan); }
        
        .url-group { display: flex; gap: 10px; }
        .btn-parse { background: rgba(176, 38, 255, 0.1); color: var(--brand-purple); border: 1px solid var(--brand-purple); border-radius: 6px; padding: 0 20px; font-weight: bold; cursor: pointer; transition: all 0.3s; white-space: nowrap; }
        .btn-parse:hover { background: var(--brand-purple); color: #fff; }
        .btn-submit { width: 100%; padding: 15px; background: rgba(0, 242, 254, 0.1); color: var(--brand-cyan); border: 1px solid var(--brand-cyan); border-radius: 6px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: all 0.3s; }
        .btn-submit:hover { background: var(--brand-cyan); color: var(--bg-dark); }
        
        #status-msg { margin-top: 15px; font-size: 0.9rem; text-align: center; }
        
        .node-list { display: flex; flex-direction: column; gap: 10px; }
        .node-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 6px; }
        .node-info h4 { margin: 0 0 5px 0; color: var(--brand-cyan); }
        .node-info p { margin: 0; font-size: 0.8rem; color: #888; }
        
        .btn-icon { background: rgba(255,255,255,0.05); color: var(--text-main); border: 1px solid var(--glass-border); padding: 8px 12px; border-radius: 4px; cursor: pointer; transition: all 0.3s; }
        .btn-icon:hover { background: rgba(255,255,255,0.2); }
        .btn-delete { color: var(--brand-red); border-color: rgba(255, 71, 87, 0.3); }
        .btn-delete:hover { background: var(--brand-red); color: white; border-color: var(--brand-red); }
        .btn-edit { color: var(--brand-emerald); border-color: rgba(16, 185, 129, 0.3); }
        .btn-edit:hover { background: var(--brand-emerald); color: white; border-color: var(--brand-emerald); }

        /* 极客模态框 */
        dialog { background: var(--bg-dark); border: 1px solid var(--brand-cyan); box-shadow: 0 0 30px rgba(0, 242, 254, 0.2); border-radius: 12px; width: 90%; max-width: 500px; color: var(--text-main); }
        dialog::backdrop { background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    </style>
</head>
<body>

    <div class="admin-container">
        
        <div class="panel" style="border-color: var(--brand-purple);">
            <h2 style="color: var(--brand-purple);"><i class="fa-solid fa-folder-tree"></i> 类别防区设置 (Category)</h2>
            <div class="url-group mb-4" style="margin-bottom: 15px;">
                <input type="text" id="new-cat-name" placeholder="> 输入新防区名称..." style="border-color: var(--brand-purple);">
                <button onclick="addCategory()" class="btn-parse">ADD_CAT</button>
            </div>
            <div id="cat-list" style="display: flex; flex-wrap: wrap; gap: 10px;">
                <p style="color: var(--brand-purple); font-size: 0.9rem;">> 正在同步防区数据...</p>
            </div>
        </div>

        <div class="panel">
            <h2><i class="fa-solid fa-terminal"></i> 智能节点录入系统</h2>
            <form id="add-node-form">
                <div class="form-group">
                    <label>> 目标网址 (URL) [先填这个，然后点击右侧解析]:</label>
                    <div class="url-group">
                        <input type="url" id="node-url" required placeholder="例如：https://github.com">
                        <button type="button" id="btn-parse" class="btn-parse"><i class="fa-solid fa-wand-magic-sparkles"></i> AI 解析</button>
                    </div>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label>> 网站名称 (Title):</label>
                        <input type="text" id="node-title" required>
                    </div>
                    <div class="form-group">
                        <label>> 描述摘要 (Description):</label>
                        <input type="text" id="node-desc">
                    </div>
                    <div class="form-group">
                        <label>> 高清图标/FA (Icon):</label>
                        <input type="text" id="node-icon">
                    </div>
                    <div class="form-group">
                        <label>> 分类归属 (Category):</label>
                        <select id="node-category"></select>
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label>> 卡片光环颜色 (Color Theme):</label>
                        <select id="node-theme">
                            <option value="cyan">赛博青 (Cyan)</option>
                            <option value="purple">霓虹紫 (Purple)</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn-submit">[ 确认注入数据 ]</button>
            </form>
            <div id="status-msg"></div>
        </div>

        <div class="panel">
            <h2><i class="fa-solid fa-server"></i> 节点阵列管理</h2>
            <div class="node-list" id="node-list-container">
                <p style="color: var(--brand-cyan);">> 正在检索节点数据...</p>
            </div>
        </div>
    </div>

    <dialog id="edit-modal">
        <h3 style="color: var(--brand-emerald); border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; margin-top: 0;">> OVERRIDE: 修改节点配置</h3>
        <form id="edit-node-form">
            <input type="hidden" id="edit-id">
            <div class="form-group"><label>网站名称</label><input type="text" id="edit-title" required></div>
            <div class="form-group"><label>网址 URL</label><input type="url" id="edit-url" required></div>
            <div class="form-group"><label>描述摘要</label><textarea id="edit-desc" rows="2"></textarea></div>
            <div class="grid-2">
                <div class="form-group"><label>图标链接/FA</label><input type="text" id="edit-icon"></div>
                <div class="form-group"><label>分类</label><select id="edit-category"></select></div>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button type="button" onclick="document.getElementById('edit-modal').close()" class="btn-icon" style="flex: 1;">CANCEL</button>
                <button type="submit" class="btn-icon btn-edit" style="flex: 1; font-weight: bold;">UPDATE</button>
            </div>
        </form>
    </dialog>

    <script>
        const statusMsg = document.getElementById('status-msg');
        let globalCategories = [];

        // ==========================================
        // 1. 系统初始化与数据同步
        // ==========================================
        async function fetchSystemData() {
            try {
                // 使用全新的 RESTful 接口拉取数据
                const [catRes, nodeRes] = await Promise.all([fetch('/api/categories'), fetch('/api/nodes')]);
                globalCategories = await catRes.json();
                const nodes = await nodeRes.json();
                
                renderCategories();
                renderNodes(nodes);
            } catch (error) {
                document.getElementById('cat-list').innerHTML = '<span style="color:#ff4757">> API 链路断开</span>';
                document.getElementById('node-list-container').innerHTML = '<p style="color: #ff4757;">> 获取节点数据失败。请检查 /api/nodes 接口。</p>';
            }
        }

        // ==========================================
        // 2. 分类管理 (Category CRUD)
        // ==========================================
        function renderCategories() {
            const list = document.getElementById('cat-list');
            const selects = [document.getElementById('node-category'), document.getElementById('edit-category')];
            
            // 渲染类别标签
            list.innerHTML = globalCategories.map(c => `
                <span style="background: rgba(176, 38, 255, 0.1); border: 1px solid var(--brand-purple); padding: 5px 10px; border-radius: 4px; font-size: 0.85rem;">
                    ${c.name} <i class="fa-solid fa-xmark" style="margin-left: 5px; cursor: pointer; color: var(--brand-red);" onclick="deleteCategory(${c.id}, '${c.name}')"></i>
                </span>
            `).join('');

            // 更新下拉菜单
            const optionsHtml = globalCategories.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
            selects.forEach(sel => sel.innerHTML = optionsHtml || '<option value="Default">Default</option>');
        }

        async function addCategory() {
            const name = document.getElementById('new-cat-name').value.trim();
            if(!name) return;
            await fetch('/api/categories', { method: 'POST', body: JSON.stringify({ name }) });
            document.getElementById('new-cat-name').value = '';
            fetchSystemData();
        }

        async function deleteCategory(id, name) {
            if(!confirm(`> 销毁分类 [ ${name} ] ?`)) return;
            await fetch('/api/categories', { method: 'DELETE', body: JSON.stringify({ id }) });
            fetchSystemData();
        }

        // ==========================================
        // 3. 节点管理 (Node CRUD)
        // ==========================================
        function renderNodes(links) {
            const container = document.getElementById('node-list-container');
            container.innerHTML = ''; 
            if (links.length === 0) {
                container.innerHTML = '<p style="color: #888;">> 暂无活跃节点。</p>';
                return;
            }
            links.forEach(link => {
                const iconHtml = link.icon && link.icon.startsWith('http') 
                    ? `<img src="${link.icon}" style="width:24px; height:24px; border-radius:4px; object-fit:contain;">` 
                    : `<i class="${link.icon}"></i>`;

                container.innerHTML += `
                    <div class="node-item">
                        <div class="node-info" style="display: flex; gap: 12px; align-items: center;">
                            <div style="display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; background: rgba(0,242,254,0.1); border-radius: 6px; color: var(--brand-cyan);">
                                ${iconHtml}
                            </div>
                            <div>
                                <h4>${link.title} <span style="font-size:0.7rem; color:#888; border:1px solid #444; padding:2px 4px; border-radius:3px; margin-left:5px;">${link.category}</span></h4>
                                <p>${link.url}</p>
                            </div>
                        </div>
                        <div style="display: flex; gap: 8px;">
                            <button class="btn-icon btn-edit" onclick="openEditModal(${encodeURIComponent(JSON.stringify(link))})"><i class="fa-solid fa-pen"></i></button>
                            <button class="btn-icon btn-delete" onclick="deleteNode(${link.id}, '${link.title}')"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });
        }

        async function deleteNode(id, title) {
            if (!confirm(`警告：确定要永久销毁 [ ${title} ] 吗？`)) return;
            await fetch('/api/nodes', { method: 'DELETE', body: JSON.stringify({ id }) });
            fetchSystemData();
        }

        // 打开编辑弹窗
        window.openEditModal = function(nodeStr) {
            const node = JSON.parse(decodeURIComponent(nodeStr));
            document.getElementById('edit-id').value = node.id;
            document.getElementById('edit-title').value = node.title;
            document.getElementById('edit-url').value = node.url;
            document.getElementById('edit-desc').value = node.description;
            document.getElementById('edit-icon').value = node.icon;
            document.getElementById('edit-category').value = node.category;
            document.getElementById('edit-modal').showModal();
        };

        // 提交修改
        document.getElementById('edit-node-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                id: document.getElementById('edit-id').value,
                title: document.getElementById('edit-title').value,
                url: document.getElementById('edit-url').value,
                description: document.getElementById('edit-desc').value,
                icon: document.getElementById('edit-icon').value,
                category: document.getElementById('edit-category').value,
                color_theme: 'cyan'
            };
            await fetch('/api/nodes', { method: 'PUT', body: JSON.stringify(payload) });
            document.getElementById('edit-modal').close();
            fetchSystemData();
        });

        // 提交新增
        document.getElementById('add-node-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            statusMsg.style.color = "var(--brand-cyan)"; statusMsg.innerText = "> 正在写入 D1 核心...";
            const payload = {
                title: document.getElementById('node-title').value,
                url: document.getElementById('node-url').value,
                description: document.getElementById('node-desc').value,
                category: document.getElementById('node-category').value,
                icon: document.getElementById('node-icon').value,
                color_theme: document.getElementById('node-theme').value
            };
            const response = await fetch('/api/nodes', { method: 'POST', body: JSON.stringify(payload) });
            if (response.ok) {
                statusMsg.style.color = "#10b981"; statusMsg.innerText = "> [成功] 数据已注入。";
                document.getElementById('add-node-form').reset();
                fetchSystemData(); 
            }
        });

        // ==========================================
        // 4. 靶向智能解析
        // ==========================================
        document.getElementById('btn-parse').addEventListener('click', async () => {
            const urlInput = document.getElementById('node-url').value;
            if (!urlInput) { statusMsg.style.color = "#ff4757"; statusMsg.innerText = "> 请先输入目标网址！"; return; }

            const parseBtn = document.getElementById('btn-parse');
            parseBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 解析中...'; parseBtn.disabled = true;
            statusMsg.style.color = "var(--brand-purple)"; statusMsg.innerText = "> 正在召唤边缘节点与 AI 进行解析...";

            try {
                const response = await fetch('/api/parse', { method: 'POST', body: JSON.stringify({ url: urlInput }) });
                if (response.ok) {
                    const data = await response.json();
                    if (data.title) document.getElementById('node-title').value = data.title;
                    if (data.description) document.getElementById('node-desc').value = data.description;
                    if (data.icon) document.getElementById('node-icon').value = data.icon;
                    statusMsg.style.color = "#10b981"; statusMsg.innerText = "> [渗透成功] 特征已自动填充！";
                }
            } catch (error) {
                statusMsg.style.color = "#ff4757"; statusMsg.innerText = "> [系统异常] 边缘解析链路中断。";
            } finally {
                parseBtn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i> AI 解析'; parseBtn.disabled = false;
            }
        });

        window.onload = fetchSystemData;
    </script>
</body>
</html>
