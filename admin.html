<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>37° Nav - 深度控制终端 (Deep Console)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #1E1F29; --panel: #282A36; --border: #44475A; --text: #F8F8F2; --text-muted: #6272A4;
            --cyan: #8BE9FD; --green: #50FA7B; --pink: #FF79C6; --purple: #BD93F9; --red: #FF5555;
        }

        body {
            background-color: var(--bg); color: var(--text); font-family: 'Courier New', Courier, monospace;
            margin: 0; padding: 20px; box-sizing: border-box; min-height: 100vh;
            background-image: radial-gradient(circle at top right, rgba(189, 147, 249, 0.05) 0%, transparent 40%);
        }

        .admin-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 25px; }
        .brand { font-size: 1.4rem; font-weight: bold; color: var(--cyan); display: flex; align-items: center; gap: 10px; }
        .back-link { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; transition: color 0.2s; border: 1px solid transparent; padding: 5px 10px; border-radius: 6px;}
        .back-link:hover { color: var(--cyan); border-color: var(--cyan); background: rgba(139,233,253,0.1);}

        /* 左右分栏 Dashboard 布局 */
        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 25px; max-width: 1400px; margin: 0 auto; }
        @media (min-width: 1024px) { .dashboard-grid { grid-template-columns: 350px 1fr; } }

        .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        h2 { margin-top: 0; font-size: 1.1rem; border-bottom: 1px solid var(--border); padding-bottom: 12px; display: flex; align-items: center; gap: 8px;}
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; color: var(--text-muted); font-size: 0.85rem;}
        input, select, textarea { width: 100%; padding: 10px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; box-sizing: border-box; font-family: inherit; transition: border-color 0.2s; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--cyan); }
        
        .input-btn-group { display: flex; gap: 8px; }
        .btn { padding: 10px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: all 0.2s; font-family: inherit; border: 1px solid transparent; background: transparent; display: flex; align-items: center; justify-content: center; gap: 6px;}
        .btn-primary { background: rgba(139, 233, 253, 0.1); border-color: var(--cyan); color: var(--cyan); width: 100%; font-size: 1rem;}
        .btn-primary:hover { background: var(--cyan); color: var(--bg); }
        .btn-ai { background: rgba(255, 121, 198, 0.1); border-color: var(--pink); color: var(--pink); white-space: nowrap; }
        .btn-ai:hover { background: var(--pink); color: var(--bg); }
        
        /* 类别阵列 */
        .cat-list { display: flex; flex-direction: column; gap: 8px; margin-top: 15px;}
        .cat-tag { background: rgba(0,0,0,0.2); border: 1px solid var(--border); padding: 8px 12px; border-radius: 6px; font-size: 0.85rem; display: flex; align-items: center; gap: 10px; transition: all 0.2s; user-select: none;}
        .cat-tag.dragging { opacity: 0.5; border-style: dashed; border-color: var(--purple); background: rgba(189,147,249,0.1); }
        .cat-tag.drag-over { border-top: 2px solid var(--purple); }
        .cat-tag span { flex-grow: 1; }
        .cat-tag i { cursor: pointer; color: var(--text-muted); transition: color 0.2s; }
        .cat-tag i:hover { color: var(--text); }
        .cat-tag i.del:hover { color: var(--red); }

        /* 节点网格 */
        .node-list { display: grid; grid-template-columns: 1fr; gap: 12px; }
        @media (min-width: 1400px) { .node-list { grid-template-columns: 1fr 1fr; } }
        .node-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 8px; transition: border-color 0.2s; }
        .node-item:hover { border-color: var(--purple); }
        .node-info { min-width: 0; flex: 1; }
        .node-info h4 { margin: 0 0 4px 0; color: var(--text); font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 8px;}
        .badge { font-size: 0.65rem; color: var(--cyan); border: 1px solid rgba(139,233,253,0.3); padding: 2px 6px; border-radius: 4px; font-weight: normal; background: rgba(139,233,253,0.05);}
        .node-info p { margin: 0; font-size: 0.75rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .action-btns { display: flex; gap: 6px; margin-left: 10px;}
        .btn-icon { background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid var(--border); width: 28px; height: 28px; border-radius: 6px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center;}
        .btn-icon.edit:hover { color: var(--cyan); border-color: var(--cyan); background: rgba(139,233,253,0.1);}
        .btn-icon.del:hover { color: var(--red); border-color: var(--red); background: rgba(255,85,85,0.1);}

        /* 模态框重载 */
        .cyber-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; }
        .cyber-overlay.active { opacity: 1; pointer-events: all; }
        .cyber-modal { background: var(--panel); border: 1px solid var(--cyan); border-radius: 12px; padding: 25px; width: 90%; max-width: 450px; transform: scale(0.95); transition: transform 0.2s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.5);}
        .cyber-overlay.active .cyber-modal { transform: scale(1); }
        .btn-modal { padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; border: 1px solid; transition: all 0.2s; background: transparent; font-family: inherit;}
        .btn-modal.cancel { border-color: var(--text-muted); color: var(--text-muted); }
        .btn-modal.cancel:hover { background: var(--border); color: var(--text); }
        .btn-modal.confirm { border-color: var(--cyan); color: var(--cyan); background: rgba(139,233,253,0.1); }
        .btn-modal.confirm:hover { background: var(--cyan); color: var(--bg); }
        .btn-modal.danger { border-color: var(--red); color: var(--red); background: rgba(255,85,85,0.1); }
        .btn-modal.danger:hover { background: var(--red); color: var(--text); }
        
        /* 高清无模糊心跳 */
        .sharp-heart { text-shadow: 0 0 3px rgba(255, 85, 85, 0.3); }
    </style>
</head>
<body>

    <div class="admin-header max-w-[1400px] mx-auto">
        <div class="brand"><i class="fa-solid fa-server"></i> 深度控制终端 <span style="font-size:0.8rem; color:var(--text-muted);">(Console)</span></div>
        <a href="/" class="back-link"><i class="fa-solid fa-arrow-left"></i> 回到主枢纽</a>
    </div>

    <div class="dashboard-grid">
        
        <div style="display: flex; flex-direction: column; gap: 25px;">
            
            <div class="panel" style="border-top: 3px solid var(--purple);">
                <h2 style="color: var(--purple);"><i class="fa-solid fa-folder-tree"></i> 类别防区编排</h2>
                <div class="input-btn-group">
                    <input type="text" id="new-cat-name" placeholder="输入新防区名称...">
                    <button onclick="addCategory()" class="btn" style="border-color:var(--purple); color:var(--purple);"><i class="fa-solid fa-plus"></i></button>
                </div>
                <div id="cat-list" class="cat-list">
                    <span style="color: var(--text-muted); font-size: 0.85rem;">正在同步防区数据...</span>
                </div>
            </div>

            <div class="panel" style="border-top: 3px solid var(--pink);">
                <h2 style="color: var(--pink);"><i class="fa-solid fa-satellite-dish"></i> 节点探针注入</h2>
                <form id="add-node-form">
                    <div class="form-group">
                        <label>目标链接 (先填此项激活 AI)</label>
                        <div class="input-btn-group">
                            <input type="url" id="node-url" required placeholder="https://...">
                            <button type="button" id="btn-parse" class="btn btn-ai" title="执行 AI 边缘解析"><i class="fa-solid fa-wand-magic-sparkles"></i></button>
                        </div>
                    </div>
                    <div class="form-group"><label>系统命名 (Title)</label><input type="text" id="node-title" required></div>
                    <div class="form-group"><label>特征摘要 (Description)</label><textarea id="node-desc" rows="2"></textarea></div>
                    <div class="form-group"><label>高清图标 (Icon / FA)</label><input type="text" id="node-icon"></div>
                    <div class="form-group"><label>归属防区 (Category)</label><select id="node-category"></select></div>
                    <button type="submit" class="btn btn-primary">注入节点 [ INJECT ]</button>
                    <div id="status-msg" style="text-align:center; font-size:0.8rem; margin-top:10px; height: 16px;"></div>
                </form>
            </div>
        </div>

        <div class="panel" style="border-top: 3px solid var(--cyan);">
            <h2 style="color: var(--cyan);"><i class="fa-solid fa-database"></i> 活跃节点数据库</h2>
            <div class="node-list" id="node-list-container">
                <span style="color: var(--text-muted); font-size: 0.9rem;">正在检索节点记录...</span>
            </div>
        </div>

    </div>

    <div id="sys-modal-root"></div>

    <script>
        const SysUI = {
            createContainer(id) {
                const existing = document.getElementById(id);
                if(existing) existing.remove();
                const overlay = document.createElement('div');
                overlay.id = id; overlay.className = 'cyber-overlay';
                document.getElementById('sys-modal-root').appendChild(overlay);
                return overlay;
            },
            close(overlay) { overlay.classList.remove('active'); setTimeout(() => overlay.remove(), 250); },
            showPrompt(title, msg, defaultVal = '') {
                return new Promise(resolve => {
                    const overlay = this.createContainer('cyber-prompt');
                    overlay.innerHTML = `<div class="cyber-modal"><div class="cyber-modal-title" style="color:var(--cyan);"><i class="fa-solid fa-terminal"></i> ${title}</div><div class="cyber-modal-msg" style="margin-bottom:15px;">${msg}</div><input type="text" id="prompt-input" value="${defaultVal}" style="width:100%; padding:10px; background:rgba(0,0,0,0.3); border:1px solid var(--border); color:var(--text); border-radius:6px; margin-bottom:20px; outline:none;"><div class="cyber-modal-actions"><button class="btn-modal cancel" id="p-cancel">取消</button><button class="btn-modal confirm" id="p-ok">确认</button></div></div>`;
                    requestAnimationFrame(() => overlay.classList.add('active'));
                    const input = overlay.querySelector('#prompt-input'); input.focus();
                    overlay.querySelector('#p-cancel').onclick = () => { this.close(overlay); resolve(null); };
                    overlay.querySelector('#p-ok').onclick = () => { this.close(overlay); resolve(input.value); };
                });
            },
            showConfirm(title, msg, isDanger = false) {
                return new Promise(resolve => {
                    const overlay = this.createContainer('cyber-confirm');
                    const themeColor = isDanger ? 'var(--red)' : 'var(--cyan)';
                    const btnClass = isDanger ? 'danger' : 'confirm';
                    const icon = isDanger ? 'fa-triangle-exclamation' : 'fa-circle-check';
                    overlay.innerHTML = `<div class="cyber-modal" style="border-color:${themeColor}"><div class="cyber-modal-title" style="color:${themeColor};"><i class="fa-solid ${icon}"></i> ${title}</div><div class="cyber-modal-msg" style="margin-bottom:20px;">${msg}</div><div class="cyber-modal-actions"><button class="btn-modal cancel" id="c-cancel">取消</button><button class="btn-modal ${btnClass}" id="c-ok">确认</button></div></div>`;
                    requestAnimationFrame(() => overlay.classList.add('active'));
                    overlay.querySelector('#c-cancel').onclick = () => { this.close(overlay); resolve(false); };
                    overlay.querySelector('#c-ok').onclick = () => { this.close(overlay); resolve(true); };
                });
            },
            showNodeEditor(node) {
                return new Promise(resolve => {
                    const overlay = this.createContainer('cyber-editor');
                    const catOptions = globalCategories.map(c => `<option value="${c.name}" ${c.name===node.category?'selected':''}>${c.name}</option>`).join('');
                    overlay.innerHTML = `
                        <div class="cyber-modal" style="max-width: 500px; border-color: var(--cyan);">
                            <div class="cyber-modal-title" style="color: var(--cyan); border-bottom:1px solid var(--border); padding-bottom:10px; margin-bottom:15px;"><i class="fa-solid fa-pen-ruler"></i> 覆写节点配置 (MODIFY)</div>
                            <form id="cyber-edit-form">
                                <div class="form-group"><label>节点名称 (Title)</label><input type="text" id="e-title" value="${node.title}" required></div>
                                <div class="form-group"><label>目标链接 (URL)</label><input type="url" id="e-url" value="${node.url}" required></div>
                                <div class="form-group"><label>特征描述 (Description)</label><textarea id="e-desc" rows="2">${node.description||''}</textarea></div>
                                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                                    <div class="form-group"><label>图标地址 (Icon)</label><input type="text" id="e-icon" value="${node.icon||''}"></div>
                                    <div class="form-group"><label>归属分类 (Category)</label><select id="e-category">${catOptions}</select></div>
                                </div>
                                <div class="cyber-modal-actions" style="margin-top: 15px;">
                                    <button type="button" class="btn-modal cancel" id="e-cancel">放弃修改</button>
                                    <button type="submit" class="btn-modal confirm">保存覆写</button>
                                </div>
                            </form>
                        </div>`;
                    requestAnimationFrame(() => overlay.classList.add('active'));
                    overlay.querySelector('#e-cancel').onclick = () => { this.close(overlay); resolve(null); };
                    overlay.querySelector('#cyber-edit-form').onsubmit = (e) => {
                        e.preventDefault();
                        resolve({ id: node.id, title: overlay.querySelector('#e-title').value, url: overlay.querySelector('#e-url').value, description: overlay.querySelector('#e-desc').value, icon: overlay.querySelector('#e-icon').value, category: overlay.querySelector('#e-category').value, color_theme: 'cyan' });
                        this.close(overlay);
                    };
                });
            }
        };

        let globalCategories = [];
        let globalNodes = [];
        const statusMsg = document.getElementById('status-msg');

        async function fetchSystemData() {
            try {
                const [catRes, nodeRes] = await Promise.all([fetch('/api/categories'), fetch('/api/nodes')]);
                globalCategories = await catRes.json();
                globalNodes = await nodeRes.json();
                renderCategories();
                renderNodes();
            } catch (err) {
                document.getElementById('node-list-container').innerHTML = '<span style="color:var(--red);">核心链路断开。</span>';
            }
        }

        // ==========================================
        // 分类核心 (含原生的拖拽排序算法)
        // ==========================================
        function renderCategories() {
            const list = document.getElementById('cat-list');
            document.getElementById('node-category').innerHTML = globalCategories.map(c => `<option value="${c.name}">${c.name}</option>`).join('') || '<option value="Default">Default</option>';
            list.innerHTML = '';
            
            globalCategories.forEach((c, index) => {
                const tag = document.createElement('div');
                tag.className = 'cat-tag'; tag.draggable = true;
                tag.innerHTML = `
                    <i class="fa-solid fa-grip-lines" style="cursor:grab;" title="拖拽排序"></i>
                    <span>${c.name}</span>
                    <i class="fa-solid fa-pen edit" title="重命名" onclick="editCategory(${c.id}, '${c.name}')"></i>
                    <i class="fa-solid fa-trash del" title="销毁" onclick="deleteCategory(${c.id}, '${c.name}')"></i>
                `;

                tag.addEventListener('dragstart', (e) => { e.target.classList.add('dragging'); e.dataTransfer.setData('text/plain', index); });
                tag.addEventListener('dragend', (e) => e.target.classList.remove('dragging'));
                tag.addEventListener('dragover', (e) => { e.preventDefault(); tag.classList.add('drag-over'); });
                tag.addEventListener('dragleave', () => tag.classList.remove('drag-over'));
                tag.addEventListener('drop', async (e) => {
                    e.preventDefault(); tag.classList.remove('drag-over');
                    const fromIdx = parseInt(e.dataTransfer.getData('text/plain'));
                    if (fromIdx === index) return;
                    const item = globalCategories.splice(fromIdx, 1)[0];
                    globalCategories.splice(index, 0, item);
                    renderCategories();
                    await fetch('/api/categories', { method: 'PUT', body: JSON.stringify(globalCategories) });
                });
                list.appendChild(tag);
            });
        }

        async function addCategory() {
            const name = document.getElementById('new-cat-name').value.trim();
            if(!name) return;
            await fetch('/api/categories', { method: 'POST', body: JSON.stringify({ name }) });
            document.getElementById('new-cat-name').value = '';
            fetchSystemData();
        }

        async function editCategory(id, oldName) {
            const newName = await SysUI.showPrompt('重命名防区', `当前名称: [ ${oldName} ]`, oldName);
            if (newName && newName !== oldName) {
                await fetch('/api/categories', { method: 'PUT', body: JSON.stringify({ id, name: newName }) });
                fetchSystemData();
            }
        }

        async function deleteCategory(id, name) {
            if (await SysUI.showConfirm('危险操作', `确定要彻底销毁防区 [ ${name} ] 吗？<br>该分类下的节点将被悬空。`, true)) {
                await fetch('/api/categories', { method: 'DELETE', body: JSON.stringify({ id }) });
                fetchSystemData();
            }
        }

        // ==========================================
        // 节点列表渲染
        // ==========================================
        function renderNodes() {
            const container = document.getElementById('node-list-container');
            if (globalNodes.length === 0) return container.innerHTML = '<span style="color:var(--text-muted);">暂无记录</span>';
            container.innerHTML = globalNodes.map(link => `
                <div class="node-item">
                    <div class="node-info">
                        <h4>${link.title} <span class="badge">${link.category}</span></h4>
                        <p>${link.url}</p>
                    </div>
                    <div class="action-btns">
                        <button class="btn-icon edit" onclick="triggerNodeEdit(${link.id})"><i class="fa-solid fa-pen"></i></button>
                        <button class="btn-icon del" onclick="triggerNodeDelete(${link.id}, '${link.title.replace(/'/g, "\\'")}')"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        window.triggerNodeEdit = async function(id) {
            const node = globalNodes.find(n => n.id === id);
            if (!node) return;
            const updatedNode = await SysUI.showNodeEditor(node);
            if (updatedNode) {
                await fetch('/api/nodes', { method: 'PUT', body: JSON.stringify(updatedNode) });
                fetchSystemData();
            }
        };

        window.triggerNodeDelete = async function(id, title) {
            if (await SysUI.showConfirm('警告', `确定抹除探针 [ ${title} ] 吗？`, true)) {
                await fetch('/api/nodes', { method: 'DELETE', body: JSON.stringify({ id }) });
                fetchSystemData();
            }
        };

        // ==========================================
        // 节点注入与 AI 抓取
        // ==========================================
        document.getElementById('add-node-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            statusMsg.style.color = "var(--cyan)"; statusMsg.innerText = "正在同步至 D1 核心...";
            const payload = { title: document.getElementById('node-title').value, url: document.getElementById('node-url').value, description: document.getElementById('node-desc').value, category: document.getElementById('node-category').value, icon: document.getElementById('node-icon').value, color_theme: 'cyan' };
            if ((await fetch('/api/nodes', { method: 'POST', body: JSON.stringify(payload) })).ok) {
                statusMsg.style.color = "var(--green)"; statusMsg.innerText = "节点注入成功。";
                document.getElementById('add-node-form').reset();
                setTimeout(() => statusMsg.innerText = "", 3000);
                fetchSystemData();
            }
        });

        document.getElementById('btn-parse').addEventListener('click', async () => {
            const urlInput = document.getElementById('node-url').value;
            if (!urlInput) { statusMsg.style.color = "var(--red)"; statusMsg.innerText = "错误：URL 为空。"; return; }
            
            const btn = document.getElementById('btn-parse');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>'; btn.disabled = true;
            statusMsg.style.color = "var(--pink)"; statusMsg.innerText = "边缘 AI 靶向解析中...";

            try {
                const res = await fetch('/api/parse', { method: 'POST', body: JSON.stringify({ url: urlInput }) });
                if (res.ok) {
                    const data = await res.json();
                    if(data.title) document.getElementById('node-title').value = data.title;
                    if(data.description) document.getElementById('node-desc').value = data.description;
                    if(data.icon) document.getElementById('node-icon').value = data.icon;
                    statusMsg.style.color = "var(--green)"; statusMsg.innerText = "解析完成。";
                }
            } catch(e) {
                statusMsg.style.color = "var(--red)"; statusMsg.innerText = "解析失败，请检查 URL。";
            } finally {
                btn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i>'; btn.disabled = false;
            }
        });

        window.onload = fetchSystemData;
    </script>
</body>
</html>
